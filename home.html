<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapp Structures — Dashboard</title>
    <link rel="icon" href="https://raw.githubusercontent.com/nick20name17/sp-lappstructures-html/main/img/shared/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --background: oklch(0.99 0.005 250);
        --foreground: oklch(0.14 0.033 262);
        --muted-foreground: oklch(0.56 0.023 255);
        --primary: oklch(0.53 0.18 260);
        --primary-foreground: oklch(1 0 0);
        --border: oklch(0.93 0.011 257);
        --card: oklch(1 0 0);
      }

      html, body { height: 100%; margin: 0; }

      body {
        font-family: "Inter", sans-serif;
        background: var(--background);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 48px 56px;
        max-width: 520px;
        width: 100%;
        text-align: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }

      .subtitle {
        color: var(--muted-foreground);
        font-size: 15px;
        margin: 0 0 28px;
      }

      .btn {
        display: inline-block;
        background: var(--primary);
        color: var(--primary-foreground);
        font-weight: 500;
        font-size: 14px;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        transition: opacity 0.15s ease;
      }

      .btn:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Dashboard</h1>
      <p class="subtitle">Welcome to Lapp Structures.</p>
      <a class="btn" href="orders.html">Go to Orders</a>
    </div>
  </body>
</html>
