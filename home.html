<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapp Structures — Redirecting</title>
    <link rel="icon" href="img/shared/favicon.ico" />
    <meta http-equiv="refresh" content="0; url=orders.html" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --radius: 0.5rem;

        --background: oklch(0.93 0.011 257);
        --background-secondary: oklch(98.837% 0.00143 285.197);
        --foreground: oklch(0.14 0.033 262);

        --card: oklch(1 0 0);
        --card-foreground: oklch(0.22 0.03 255);

        --popover: oklch(1 0 0);
        --popover-foreground: oklch(0.22 0.03 255);

        --primary: oklch(0.53 0.18 260);
        --primary-foreground: oklch(1 0 0);

        --secondary: oklch(0.97 0.005 250);
        --secondary-foreground: oklch(0.14 0.033 262);
        --secondary-hover: oklch(0.93 0.011 257);

        --muted: oklch(0.97 0.005 250);
        --muted-foreground: oklch(0.56 0.023 255);

        --accent: oklch(0.96 0.03 260);
        --accent-foreground: oklch(0.53 0.18 260);

        --destructive: oklch(0.50 0.19 25);
        --destructive-foreground: oklch(1 0 0);

        --success: oklch(0.58 0.16 150);
        --success-foreground: oklch(1 0 0);

        --border: oklch(0.93 0.011 257);
        --input: oklch(0.92 0.01 250);
        --ring: oklch(0.53 0.18 260);

        --chart-1: oklch(0.53 0.18 260);
        --chart-2: oklch(0.58 0.16 150);
        --chart-3: oklch(0.60 0.10 220);
        --chart-4: oklch(0.75 0.12 80);
        --chart-5: oklch(0.65 0.15 25);

        --sidebar: oklch(1 0 0);
        --sidebar-foreground: oklch(0.55 0.02 255);
        --sidebar-primary: oklch(0.53 0.18 260);
        --sidebar-primary-foreground: oklch(1 0 0);
        --sidebar-accent: oklch(0.97 0.005 250);
        --sidebar-accent-foreground: oklch(0.14 0.033 262);
        --sidebar-border: oklch(0.92 0.01 250);
        --sidebar-ring: oklch(0.53 0.18 260);

        --brand-navy: #163259;
        --font-body: "Inter", sans-serif;
        --font-display: "SF Pro Display", "Inter", sans-serif;
      }

      html, body { height: 100%; margin: 0; }

      body {
        font-family: "Inter", sans-serif;
        background: var(--background);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .redirect-note {
        text-align: center;
        color: var(--muted-foreground);
        font-size: 14px;
      }

      .redirect-link {
        color: var(--foreground);
        text-decoration: underline;
      }
    </style>
  </head>
  <body data-comment="home-body">
    <p class="redirect-note" data-comment="home-redirect-note">
      Redirecting to <a class="redirect-link" href="orders.html" data-comment="home-redirect-link">orders</a>...
    </p>
    <script>
      window.location.replace("orders.html");
    </script>
  </body>
</html>
