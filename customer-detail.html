<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapp Structures — Customer Detail</title>
    <link rel="icon" href="https://raw.githubusercontent.com/nick20name17/sp-lappstructures-html/main/img/shared/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <style>
      /* ───── Reset ───── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ───── Design tokens ───── */
      :root {
        --radius: 0.5rem;
        --background: oklch(0.93 0.011 257);
        --background-secondary: oklch(98.837% 0.00143 285.197);
        --foreground: oklch(0.14 0.033 262);
        --card: oklch(1 0 0);
        --card-foreground: oklch(0.22 0.03 255);
        --popover: oklch(1 0 0);
        --primary: oklch(0.53 0.18 260);
        --primary-foreground: oklch(1 0 0);
        --secondary: oklch(0.97 0.005 250);
        --secondary-foreground: oklch(0.14 0.033 262);
        --secondary-hover: oklch(0.93 0.011 257);
        --muted: oklch(0.97 0.005 250);
        --muted-foreground: oklch(0.56 0.023 255);
        --accent: oklch(0.96 0.03 260);
        --accent-foreground: oklch(0.53 0.18 260);
        --destructive: oklch(0.50 0.19 25);
        --success: oklch(0.58 0.16 150);
        --border: oklch(0.93 0.011 257);
        --input: oklch(0.92 0.01 250);
        --ring: oklch(0.53 0.18 260);

        --sidebar: oklch(1 0 0);
        --sidebar-foreground: oklch(0.55 0.02 255);
        --sidebar-primary: oklch(0.53 0.18 260);
        --sidebar-accent: oklch(0.97 0.005 250);
        --sidebar-accent-foreground: oklch(0.14 0.033 262);
        --sidebar-border: oklch(0.92 0.01 250);

        --amber-bg: #fef3c7;
        --amber-fg: #92400e;
        --green-bg: #dcfce7;
        --green-fg: #166534;

        --brand-navy: #163259;
        --font-body: "Inter", sans-serif;
        --font-display: "SF Pro Display", "Inter", sans-serif;
      }

      html,
      body { height: 100%; }

      body {
        font-family: var(--font-body);
        background: var(--background);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        overflow: hidden;
      }

      button { cursor: pointer; font-family: inherit; border: 0; background: transparent; }
      a { color: inherit; text-decoration: none; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: color-mix(in oklch, var(--muted-foreground) 30%, transparent);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: color-mix(in oklch, var(--muted-foreground) 50%, transparent);
      }

      /* ───── App layout ───── */
      .app-shell {
        background: var(--background);
        padding: 16px;
        height: 100vh;
      }
      .app-frame {
        display: flex;
        height: calc(100vh - 32px);
        border-radius: 12px;
        overflow: hidden;
      }

      /* ───── Sidebar ───── */
      .sidebar {
        display: flex;
        flex-direction: column;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        flex-shrink: 0;
        overflow: hidden;
        width: 240px;
        transition: width 0.2s ease;
      }
      .sidebar.collapsed { width: 56px; }

      .sidebar-logo {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        padding: 0 16px 16px;
        height: 64px;
        flex-shrink: 0;
      }
      .sidebar.collapsed .sidebar-logo {
        justify-content: center;
        padding: 0 0 16px;
        gap: 0;
      }
      .sidebar-logo-mark {
        display: flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sidebar-logo-mark img { width: 24px; height: 24px; }
      .sidebar-logo-text {
        font-family: var(--font-display);
        font-size: 1.25rem;
        line-height: 1.2;
        font-weight: 500;
        letter-spacing: 0.025em;
        color: var(--brand-navy);
        white-space: nowrap;
        overflow: hidden;
        transition: opacity 0.2s ease, width 0.2s ease;
      }
      .sidebar.collapsed .sidebar-logo-text { width: 0; opacity: 0; }

      .sidebar-search { position: relative; padding: 0 8px 4px; }
      .sidebar-search-input-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 6px;
        border: 1px solid transparent;
        background: color-mix(in oklch, var(--sidebar-accent) 40%, transparent);
        padding: 6px 10px;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .sidebar-search-input-wrap:hover,
      .sidebar-search-input-wrap.is-open {
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
      }
      .sidebar-search-input-wrap.is-open {
        border-color: color-mix(in oklch, var(--sidebar-foreground) 20%, transparent);
      }
      .sidebar-search-icon {
        width: 14px;
        height: 14px;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        flex-shrink: 0;
      }
      .sidebar-search-input {
        flex: 1;
        min-width: 0;
        background: transparent;
        font-size: 0.875rem;
        font-family: inherit;
        color: var(--sidebar-foreground);
        border: 0;
        outline: none;
      }
      .sidebar-search-input::placeholder {
        color: color-mix(in oklch, var(--sidebar-foreground) 40%, transparent);
      }
      .sidebar-search-dropdown {
        position: absolute;
        bottom: 100%;
        left: 4px;
        right: 4px;
        margin-bottom: 4px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--popover);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        overflow: hidden;
        z-index: 50;
      }
      .sidebar-search-dropdown-empty {
        padding: 16px 12px;
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted-foreground);
      }
      .sidebar-search-dropdown ul {
        list-style: none;
        max-height: 224px;
        overflow-y: auto;
        padding: 4px 0;
      }
      .sidebar-search-dropdown-item {
        display: block;
        width: 100%;
        padding: 8px 12px;
        text-align: left;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .sidebar-search-dropdown-item:hover { background: var(--accent); }
      .sidebar-search-dropdown-item-name {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.2;
      }
      .sidebar-search-dropdown-item-email {
        margin-top: 2px;
        font-size: 0.75rem;
        color: var(--muted-foreground);
        line-height: 1.2;
      }
      .sidebar.collapsed .sidebar-search { padding: 0 8px 4px; }
      .sidebar.collapsed .sidebar-search-collapsed {
        height: 34px;
        padding-bottom: 4px;
        background: color-mix(in oklch, var(--sidebar-accent) 40%, transparent);
        margin: 0 8px;
        display: flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        justify-content: center;
        align-items: center;
      }

      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 16px 8px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .sidebar-nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px 6px 6px;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--sidebar-foreground);
        transition: background 0.15s ease, color 0.15s ease;
      }
      .sidebar-nav-link:hover {
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
        color: var(--sidebar-accent-foreground);
      }
      .sidebar-nav-link.active {
        background: var(--sidebar-accent);
        color: var(--sidebar-accent-foreground);
      }
      .sidebar-nav-link-icon {
        padding: 4px;
        border-radius: 4px;
        background: var(--sidebar-accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sidebar-nav-link.active .sidebar-nav-link-icon { background: var(--sidebar); }
      .sidebar-nav-link-icon svg { width: 16px; height: 16px; }
      .sidebar-nav-link-label {
        white-space: nowrap;
        overflow: hidden;
        transition: opacity 0.2s ease, width 0.2s ease;
      }
      .sidebar.collapsed .sidebar-nav-link-label { width: 0; opacity: 0; }
      .sidebar-nav-link-badge { margin-left: auto; display: inline-flex; gap: 4px; }
      .sidebar.collapsed .sidebar-nav-link-badge { display: none; }
      .sidebar-badge {
        display: inline-flex;
        width: 20px;
        height: 20px;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        font-size: 10px;
        font-weight: 600;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        padding: 0 4px;
      }
      .sidebar-badge.amber { background: rgba(245, 158, 11, 0.2); color: rgb(180, 83, 9); }
      .sidebar-badge.blue { background: rgba(59, 130, 246, 0.2); color: rgb(29, 78, 216); }

      .sidebar-bottom {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 0 8px 16px;
        flex-shrink: 0;
      }
      .sidebar-collapse-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 6px 10px 6px 6px;
        border-radius: 6px;
        color: var(--sidebar-foreground);
        font-size: 0.875rem;
        font-weight: 500;
      }
      .sidebar-collapse-btn:hover {
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
        color: var(--sidebar-accent-foreground);
      }
      .sidebar-collapse-btn-icon {
        padding: 4px;
        border-radius: 4px;
        background: var(--sidebar-accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sidebar-collapse-btn:hover .sidebar-collapse-btn-icon { background: var(--sidebar); }
      .sidebar-collapse-btn-icon svg { width: 16px; height: 16px; }
      .sidebar-collapse-btn-label {
        white-space: nowrap;
        overflow: hidden;
        transition: opacity 0.2s ease, width 0.2s ease;
      }
      .sidebar.collapsed .sidebar-collapse-btn-label { width: 0; opacity: 0; }
      .sidebar-user {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 6px;
        border-radius: 6px;
      }
      .sidebar.collapsed .sidebar-user { justify-content: center; }
      .sidebar-user-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 9999px;
        background: var(--primary);
        color: var(--primary-foreground);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
        flex-shrink: 0;
      }
      .sidebar-user-text { display: flex; flex-direction: column; min-width: 0; }
      .sidebar.collapsed .sidebar-user-text,
      .sidebar.collapsed .sidebar-user-logout { display: none; }
      .sidebar-user-name {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--sidebar-foreground);
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sidebar-user-email {
        font-size: 0.75rem;
        line-height: 1.2;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sidebar-user-logout {
        flex-shrink: 0;
        padding: 4px;
        border-radius: 6px;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .sidebar-user-logout:hover {
        color: var(--sidebar-foreground);
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
      }
      .sidebar-user-logout svg { width: 16px; height: 16px; }

      /* ───── Main / page header ───── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--background-secondary);
      }
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .page-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px 16px;
        background: var(--background-secondary);
      }
      @media (min-width: 640px) {
        .page-header { padding: 16px; }
      }
      .page-header-title-wrap { min-width: 0; }
      .page-header-title {
        font-size: 1.125rem;
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: -0.025em;
        color: color-mix(in oklch, var(--foreground) 70%, transparent);
      }
      @media (min-width: 640px) {
        .page-header-title { font-size: 1.25rem; }
      }
      .page-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      /* ───── Buttons ───── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        white-space: nowrap;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        height: 36px;
        padding: 8px 12px;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .btn:disabled { pointer-events: none; opacity: 0.5; }
      .btn-primary { background: var(--primary); color: var(--primary-foreground); }
      .btn-primary:hover { background: color-mix(in oklch, var(--primary) 90%, black); }
      .btn-outline {
        background: var(--card);
        color: var(--foreground);
        border: 1px solid var(--border);
      }
      .btn-outline:hover { background: var(--secondary); }
      .btn-ghost { background: transparent; color: var(--muted-foreground); }
      .btn-ghost:hover { background: var(--secondary); color: var(--foreground); }
      .btn-destructive { background: var(--destructive); color: white; }
      .btn-destructive:hover { background: color-mix(in oklch, var(--destructive) 88%, black); }
      .btn-sm { height: 32px; padding: 6px 10px; font-size: 0.8125rem; }
      .btn-icon-sm {
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 6px;
      }
      .btn svg { width: 16px; height: 16px; }

      /* ───── Customer body layout ───── */
      .cd-body {
        flex: 1;
        min-height: 0;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: stretch;
        overflow-y: auto;
        overflow-x: hidden;
      }
      @media (min-width: 640px) {
        .cd-body {
          padding: 16px;
          flex-direction: row;
          gap: 16px;
          overflow: hidden;
        }
      }

      /* ───── Left card (info) ───── */
      .cd-info-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
        flex-shrink: 0;
      }
      @media (min-width: 640px) {
        .cd-info-card {
          width: 288px;
          align-self: flex-start;
          position: sticky;
          top: 0;
          max-height: 100%;
          overflow-y: auto;
        }
      }

      .cd-info-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .cd-info-card-title {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--foreground);
      }

      /* ── Avatar block ── */
      .cd-info-avatar-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .cd-info-avatar {
        width: 40px;
        height: 40px;
        border-radius: 9999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
        font-weight: 600;
        background: var(--secondary);
        color: var(--secondary-foreground);
        flex-shrink: 0;
      }
      .cd-info-avatar-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
      .cd-info-name {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.2;
        color: var(--foreground);
      }
      .cd-tag-list {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .cd-tag-badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 8px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.2;
        white-space: nowrap;
        background: var(--secondary);
        color: var(--muted-foreground);
      }

      /* ── Contact / details / addresses ── */
      .cd-info-section { display: flex; flex-direction: column; gap: 10px; }
      .cd-info-divider {
        height: 1px;
        background: var(--border);
        margin: 0;
        border: 0;
      }
      .cd-info-contact-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 0.875rem;
        word-break: break-word;
      }
      .cd-info-contact-row svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        margin-top: 2px;
        color: var(--muted-foreground);
      }
      .cd-info-detail { display: flex; flex-direction: column; gap: 2px; }
      .cd-info-detail-label {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-foreground);
      }
      .cd-info-detail-value { font-size: 0.875rem; color: var(--foreground); }
      .cd-info-addresses { display: flex; flex-direction: column; gap: 8px; }
      .cd-info-address-card {
        border: 1px solid var(--border);
        background: color-mix(in oklch, var(--muted) 50%, transparent);
        border-radius: 8px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cd-info-address-label {
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-foreground);
      }
      .cd-info-address-value { font-size: 0.875rem; color: var(--foreground); line-height: 1.4; }

      /* ───── Right pane (tabs) ───── */
      .cd-right {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .cd-tabs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .cd-tabs-list {
        display: inline-flex;
        background: var(--secondary);
        padding: 4px;
        border-radius: 8px;
        gap: 2px;
      }
      .cd-tab-trigger {
        padding: 6px 14px;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--muted-foreground);
        background: transparent;
        border-radius: 6px;
        font-family: inherit;
      }
      .cd-tab-trigger.is-active {
        background: var(--card);
        color: var(--foreground);
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }
      .cd-tab-trigger:hover:not(.is-active) { color: var(--foreground); }

      .cd-tab-content {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 12px 0 0;
      }
      .cd-tab-content[hidden] { display: none; }

      /* ───── Table ───── */
      .cd-table-wrap {
        flex: 1;
        min-height: 0;
        overflow-x: auto;
        overflow-y: auto;
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 12px;
      }
      .cd-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      .cd-table thead tr {
        border-bottom: 1px solid var(--border);
        background: color-mix(in oklch, var(--muted) 50%, transparent);
        position: sticky;
        top: 0;
      }
      .cd-table th {
        text-align: left;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted-foreground);
        padding: 10px 12px;
        white-space: nowrap;
      }
      .cd-table tbody tr {
        border-bottom: 1px solid color-mix(in oklch, var(--border) 50%, transparent);
        cursor: pointer;
      }
      .cd-table tbody tr:hover { background: color-mix(in oklch, var(--accent) 30%, transparent); }
      .cd-table td {
        padding: 10px 12px;
        color: var(--foreground);
        vertical-align: middle;
      }
      .cd-table .empty {
        text-align: center;
        padding: 32px 16px;
        color: var(--muted-foreground);
        font-size: 0.875rem;
      }
      .cell-overflow {
        display: inline-block;
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        vertical-align: middle;
      }

      /* ───── Stage badge (mirror) ───── */
      .stage-badge {
        position: relative;
        display: inline-flex;
        height: 26px;
        width: 100%;
        max-width: 160px;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 9999px;
        border: 1px solid color-mix(in oklch, var(--primary) 40%, transparent);
        background: color-mix(in oklch, var(--primary) 10%, transparent);
      }
      .stage-badge-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        background: color-mix(in oklch, var(--primary) 25%, transparent);
      }
      .stage-badge-label {
        position: relative;
        z-index: 1;
        font-size: 0.6875rem;
        font-weight: 500;
        color: var(--primary);
        padding: 0 10px;
        white-space: nowrap;

      /* ───── Pagination ───── */
      .cd-pagination {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        padding: 10px 0 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.8125rem;
        color: var(--muted-foreground);
        gap: 12px;
      }

      /* ───── Skeleton ───── */
      .skeleton {
        display: block;
        background: linear-gradient(
          90deg,
          color-mix(in oklch, var(--muted) 70%, transparent) 25%,
          color-mix(in oklch, var(--border) 70%, transparent) 50%,
          color-mix(in oklch, var(--muted) 70%, transparent) 75%
        );
        background-size: 200% 100%;
        animation: skeleton-pulse 1.4s ease-in-out infinite;
        border-radius: 4px;
      }
      @keyframes skeleton-pulse {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ───── Dialog ───── */
      .cd-dialog-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 60;
        padding: 24px;
      }
      .cd-dialog-overlay.is-open { display: flex; }
      .cd-dialog {
        background: var(--card);
        border-radius: 14px;
        padding: 22px;
        max-width: 480px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      }
      .cd-dialog-title { font-size: 1.05rem; font-weight: 600; }
      .cd-dialog-desc { font-size: 0.875rem; color: var(--muted-foreground); }
      .cd-dialog-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .cd-form-row { display: flex; flex-direction: column; gap: 4px; }
      .cd-form-row label {
        font-size: 0.8125rem;
        font-weight: 500;
      }
      .cd-form-row input,
      .cd-form-row textarea {
        height: 36px;
        padding: 0 10px;
        border: 1px solid var(--input);
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.875rem;
        outline: none;
        background: var(--card);
        color: var(--foreground);
      }

      .cd-form-row input:focus,
      .cd-form-row textarea:focus { border-color: var(--ring); }
      .cd-form-grid {

        grid-template-columns: 1fr 1fr;

        flex: 1;

      /* ───── Store ───── */
      function createStore(initialState) {
        let state = structuredClone(initialState);
        const listeners = new Set();
        return {
          get: () => state,
          set(updater) {
            state = { ...state, ...(typeof updater === "function" ? updater(state) : updater) };
            listeners.forEach((fn) => fn(state));
          },
          subscribe(fn) {
            listeners.add(fn);
            return () => listeners.delete(fn);
          },
        };
      }

      /* ───── Toast ───── */
      function toast(msg, variant = "success") {
        let c = document.querySelector(".toast-container");
        if (!c) {
          c = document.createElement("div");
          c.className = "toast-container";
          c.setAttribute("data-comment", "toast-container");
          document.body.appendChild(c);
        }
        const el = document.createElement("div");
        el.className = `toast ${variant}`;
        el.setAttribute("data-comment", `toast-${Date.now()}`);
        el.textContent = msg;
        c.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }

      /* ───── Format helpers ───── */
      function formatDate(value) {
        if (!value) return "—";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleDateString("en-US", {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }
      function formatCurrency(value) {
        if (value == null) return "—";
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
        }).format(value);
      }
      function formatPhone(p) {
        if (!p) return "";
        const d = String(p).replace(/\D/g, "");
        if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
        return p;
      }
      function formatAddress(addr) {
        if (!addr) return null;
        const parts = [addr.street, addr.city, addr.state, addr.zip_code].filter(Boolean);
        return parts.length ? parts.join(", ") : null;
      }
      function esc(v) {
        if (v == null) return "";
        return String(v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

        const showDropdown = s.searchOpen && s.sidebarSearchTerm.trim().length > 0;
        const dropdown = document.getElementById("sidebar-search-dropdown");
        dropdown.style.display = showDropdown ? "block" : "none";
        if (!showDropdown) return;
        const filtered = s.sidebarCustomers.filter((c) => {
          const fullName = `${c.first_name} ${c.last_name}`.toLowerCase();
          const term = s.sidebarSearchTerm.trim().toLowerCase();
          return (
            fullName.includes(term) ||
            (c.email && c.email.toLowerCase().includes(term))
          );
        });
        const empty = document.getElementById("sidebar-search-empty");
        const list = document.getElementById("sidebar-search-list");
        if (filtered.length === 0) {

                  <td data-comment="customer-detail-orders-row-${idSafe}-created">${formatDate(o.crea_date)}</td>
                  <td data-comment="customer-detail-orders-row-${idSafe}-category"><span class="cell-overflow">${esc(o.category || "—")}</span></td>
                  <td data-comment="customer-detail-orders-row-${idSafe}-stage">${renderStageBadge(o.status, `customer-detail-orders-row-${idSafe}-stage-badge`)}</td>
                  <td data-comment="customer-detail-orders-row-${idSafe}-scheduled">${formatDate(o.dp_estprod)}</td>
                  <td data-comment="customer-detail-orders-row-${idSafe}-ship-type">${esc(o.ship_type || "—")}</td>
                  <td data-comment="customer-detail-orders-row-${idSafe}-total">${formatCurrency(o.total)}</td>
                </tr>
              `;
            }).join("");

        return `
          <div class="cd-table-wrap" data-comment="customer-detail-orders-table-wrap">
            <table class="cd-table" data-comment="customer-detail-orders-table" data-component="table">
              <thead data-comment="customer-detail-orders-thead">
                <tr data-comment="customer-detail-orders-thead-row">
                  <th data-comment="customer-detail-orders-th-invoice">Invoice</th>
                  <th data-comment="customer-detail-orders-th-created">Created</th>
                  <th data-comment="customer-detail-orders-th-category">Category</th>
                  <th data-comment="customer-detail-orders-th-stage">Stage</th>
                  <th data-comment="customer-detail-orders-th-scheduled">Scheduled</th>
                  <th data-comment="customer-detail-orders-th-ship-type">Ship Type</th>
                  <th data-comment="customer-detail-orders-th-total">Total</th>
                </tr>
              </thead>
              <tbody data-comment="customer-detail-orders-tbody">${bodyRows}</tbody>
            </table>
          </div>
        `;
      }

      /* ───── Render: skeleton ───── */
      function renderSkeleton() {
        const content = document.getElementById("customer-detail-content");
        content.innerHTML = `
          <div class="cd-info-card" data-comment="customer-detail-skeleton-info-card">
            <div class="cd-info-card-header" data-comment="customer-detail-skeleton-info-card-header">
              <span class="skeleton" data-comment="customer-detail-skeleton-info-card-title" style="width:120px;height:16px"></span>
            </div>
            <div class="cd-info-avatar-row" data-comment="customer-detail-skeleton-info-avatar-row">
              <span class="skeleton" data-comment="customer-detail-skeleton-info-avatar" style="width:40px;height:40px;border-radius:9999px"></span>
              <div data-comment="customer-detail-skeleton-info-avatar-info">
                <span class="skeleton" data-comment="customer-detail-skeleton-info-name" style="width:120px;height:16px;margin-bottom:6px"></span>
                <span class="skeleton" data-comment="customer-detail-skeleton-info-tag" style="width:60px;height:14px;border-radius:9999px"></span>
              </div>
            </div>
            <hr class="cd-info-divider" data-comment="customer-detail-skeleton-info-divider-1" />
            ${[1,2,3].map((i) => `<span class="skeleton" data-comment="customer-detail-skeleton-info-row-${i}" style="width:80%;height:14px;margin-bottom:8px"></span>`).join("")}
            <hr class="cd-info-divider" data-comment="customer-detail-skeleton-info-divider-2" />
            ${[1,2].map((i) => `
              <div data-comment="customer-detail-skeleton-info-address-${i}">
                <span class="skeleton" data-comment="customer-detail-skeleton-info-address-${i}-label" style="width:60px;height:12px;margin-bottom:4px"></span>
                <span class="skeleton" data-comment="customer-detail-skeleton-info-address-${i}-value" style="width:100%;height:14px"></span>
              </div>
            `).join("")}
          </div>
          <div class="cd-right" data-comment="customer-detail-skeleton-right">
            <div class="cd-tabs-header" data-comment="customer-detail-skeleton-tabs-header">
              <span class="skeleton" data-comment="customer-detail-skeleton-tabs-list" style="width:160px;height:32px;border-radius:8px"></span>
              <span class="skeleton" data-comment="customer-detail-skeleton-new-estimate" style="width:130px;height:32px;border-radius:8px"></span>
            </div>
            <div class="cd-tab-content" data-comment="customer-detail-skeleton-tab-content">
              <div class="cd-table-wrap" data-comment="customer-detail-skeleton-table-wrap">
                ${[1,2,3,4,5].map((i) => `<div data-comment="customer-detail-skeleton-row-${i}" style="display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border)"><span class="skeleton" style="width:80px;height:14px"></span><span class="skeleton" style="width:100px;height:14px"></span><span class="skeleton" style="flex:1;height:14px"></span><span class="skeleton" style="width:80px;height:14px"></span></div>`).join("")}
              </div>
            </div>
          </div>
        `;
      }

      /* ───── Render: empty ───── */
      function renderEmpty() {
        const content = document.getElementById("customer-detail-content");
        content.innerHTML = `
          <div class="cd-empty" data-comment="customer-detail-empty-state">
            ${ICONS.alertCircle.replace('<svg ', '<svg data-comment="customer-detail-empty-icon" ')}
            <h2 class="cd-empty-heading" data-comment="customer-detail-empty-heading">Customer not found</h2>
            <p class="cd-empty-text" data-comment="customer-detail-empty-text">No customer matches the id in the URL.</p>
            <a class="btn btn-primary btn-sm" data-comment="customer-detail-empty-back-link" data-component="button" href="customers.html">
              ${ICONS.userRound}
              Back to Customers
            </a>
          </div>
        `;
      }

      /* ───── Render: full data state ───── */
      function renderDataState(c) {
        const s = store.get();
        const orders = getCustomerOrders(c.id);
        const estimates = getCustomerEstimates(c.id);
        const tab = s.tabParam === "orders" ? "orders" : "estimates";

        return `
          <!-- ── Left card: info ── -->
          <aside class="cd-info-card" data-comment="customer-detail-info-card" data-component="card">
            <div class="cd-info-card-header" data-comment="customer-detail-info-card-header">
              <h2 class="cd-info-card-title" data-comment="customer-detail-info-card-title">Customer Info</h2>
              <button type="button" class="btn btn-ghost btn-icon-sm" data-comment="customer-detail-info-edit-btn" data-component="button" data-open-dialog="edit" aria-label="Edit customer">
                ${ICONS.pencil}
              </button>
            </div>
            ${renderInfoCardBody(c)}
          </aside>

          <!-- ── Right: tabs ── -->
          <section class="cd-right" data-comment="customer-detail-right" data-component="tabs">
            <div class="cd-tabs-header" data-comment="customer-detail-tabs-header">
              <div class="cd-tabs-list" data-comment="customer-detail-tabs-list" role="tablist">
                <button type="button"
                  class="cd-tab-trigger ${tab === "estimates" ? "is-active" : ""}"
                  data-comment="customer-detail-tab-trigger-estimates"
                  data-component="button"
                  data-tab="estimates"
                  role="tab"
                  aria-selected="${tab === "estimates"}">Estimates</button>
                <button type="button"
                  class="cd-tab-trigger ${tab === "orders" ? "is-active" : ""}"
                  data-comment="customer-detail-tab-trigger-orders"
                  data-component="button"
                  data-tab="orders"
                  role="tab"
                  aria-selected="${tab === "orders"}">Sales Orders</button>
              </div>
              <a class="btn btn-primary btn-sm" data-comment="customer-detail-action-new-estimate" data-component="button" href="estimates.html?customerId=${c.id}">
                ${ICONS.plus}
                New Estimate
              </a>
            </div>

            <div class="cd-tab-content" data-comment="customer-detail-tab-content-estimates" ${tab === "estimates" ? "" : "hidden"} role="tabpanel">
              ${renderEstimatesTable(estimates, c.id)}
              <div class="cd-pagination" data-comment="customer-detail-estimates-pagination">
                <span data-comment="customer-detail-estimates-pagination-label">Page 1 of 1</span>
                <span data-comment="customer-detail-estimates-pagination-count">${estimates.length} item${estimates.length === 1 ? "" : "s"}</span>
              </div>
            </div>

            <div class="cd-tab-content" data-comment="customer-detail-tab-content-orders" ${tab === "orders" ? "" : "hidden"} role="tabpanel">
              ${renderOrdersTable(orders)}
              <div class="cd-pagination" data-comment="customer-detail-orders-pagination">
                <span data-comment="customer-detail-orders-pagination-label">Page 1 of 1</span>
                <span data-comment="customer-detail-orders-pagination-count">${orders.length} order${orders.length === 1 ? "" : "s"}</span>
              </div>
            </div>
          </section>
        `;
      }

      function renderContent() {
        const s = store.get();
        if (s.isLoading) {
          renderSkeleton();
          return;
        }
        const c = getActiveCustomer();
        if (!c) {
          renderEmpty();
          return;
        }
        document.getElementById("customer-detail-content").innerHTML = renderDataState(c);
        // populate edit form
        document.getElementById("cd-edit-first-name").value = c.first_name || "";
        document.getElementById("cd-edit-last-name").value = c.last_name || "";
        document.getElementById("cd-edit-email").value = c.email || "";
        document.getElementById("cd-edit-phone").value = formatPhone(c.primary_phone) || "";
        document.getElementById("cd-edit-note").value = c.note || "";
        // delete dialog name
        const desc = document.getElementById("customer-detail-delete-dialog-description-text");
        desc.textContent = `Delete ${c.first_name} ${c.last_name}? This action cannot be undone.`;
      }

      function renderDialogs() {
        const s = store.get();
        document.getElementById("edit-dialog-overlay").classList.toggle("is-open", s.editDialogOpen);
        document.getElementById("delete-dialog-overlay").classList.toggle("is-open", s.deleteDialogOpen);
      }

      /* ───── Subscriptions ───── */
      store.subscribe(renderSidebarNav);
      store.subscribe(renderUser);
      store.subscribe(renderCollapse);
      store.subscribe(renderSidebarSearch);
      store.subscribe(renderHeaderTitle);
      store.subscribe(renderContent);
      store.subscribe(renderDialogs);

      renderSidebarNav();
      renderUser();
      renderCollapse();
      renderSidebarSearch();
      renderHeaderTitle();
      renderContent();
      renderDialogs();

      /* ───── Simulate loading ───── */
      setTimeout(() => store.set({ isLoading: false }), 300);

      /* ───── Sidebar handlers ───── */
      document.getElementById("sidebar-collapse-btn").addEventListener("click", () => {
        store.set((s) => ({ collapsed: !s.collapsed }));
      });

      const searchInput = document.getElementById("sidebar-search-input");
      searchInput.addEventListener("focus", () => store.set({ searchOpen: true }));
      searchInput.addEventListener("blur", () => setTimeout(() => store.set({ searchOpen: false }), 150));
      searchInput.addEventListener("input", (e) => store.set({ sidebarSearchTerm: e.target.value }));

      document.getElementById("sidebar-search-list").addEventListener("mousedown", (e) => {
        const btn = e.target.closest("[data-customer-id]");
        if (!btn) return;
        const id = btn.dataset.customerId;
        searchInput.value = "";
        store.set({ searchOpen: false, sidebarSearchTerm: "" });
        window.location.href = `customer-detail.html?id=${id}`;
      });

      document.getElementById("sidebar-user-logout").addEventListener("click", () => {
        window.location.href = "login.html";
      });

      /* ───── Tab + dialog handlers (event delegation) ───── */
      document.body.addEventListener("click", (e) => {
        const tabBtn = e.target.closest("[data-tab]");
        if (tabBtn) {
          const tab = tabBtn.dataset.tab;
          store.set({ tabParam: tab });
          // Update URL search param
          const url = new URL(window.location.href);
          if (tab === "orders") url.searchParams.set("tab", "orders");
          else url.searchParams.delete("tab");
          window.history.replaceState({}, "", url.toString());
          return;
        }
        const opener = e.target.closest("[data-open-dialog]");
        if (opener) {
          const which = opener.dataset.openDialog;
          if (which === "edit") store.set({ editDialogOpen: true });
          return;
        }
        const cancel = e.target.closest("[data-dialog-cancel]");
        if (cancel) {
          const which = cancel.dataset.dialogCancel;
          if (which === "edit") store.set({ editDialogOpen: false });
          if (which === "delete") store.set({ deleteDialogOpen: false });
          return;
        }
        const save = e.target.closest("[data-dialog-save]");
        if (save) {
          const which = save.dataset.dialogSave;
          if (which === "edit") {
            // Apply edits to active customer in store
            const c = getActiveCustomer();
            if (c) {
              const updates = {
                first_name: document.getElementById("cd-edit-first-name").value.trim(),
                last_name: document.getElementById("cd-edit-last-name").value.trim(),
                email: document.getElementById("cd-edit-email").value.trim(),
                primary_phone: document.getElementById("cd-edit-phone").value.replace(/\D/g, ""),
                note: document.getElementById("cd-edit-note").value.trim(),
              };
              // Minimal validation
              if (!updates.first_name || !updates.last_name || !updates.email || !updates.email.includes("@")) {
                if (typeof toast === "function") toast("Please fill in name and a valid email", "error");
                return;
              }
              store.set((s) => ({
                customers: s.customers.map((cc) => (cc.id === c.id ? { ...cc, ...updates } : cc)),
                editDialogOpen: false,
              }));
              if (typeof toast === "function") toast("Customer updated");
            }
          }
          return;
        }
        const del = e.target.closest("[data-dialog-delete]");
        if (del) {
          store.set({ editDialogOpen: false, deleteDialogOpen: true });
          return;
        }
        const confirmDel = e.target.closest("[data-dialog-confirm]");
        if (confirmDel && confirmDel.dataset.dialogConfirm === "delete") {
          // "Delete" the active customer locally, then go back to the list
          const c = getActiveCustomer();
          if (c) {
            store.set((s) => ({
              customers: s.customers.filter((cc) => cc.id !== c.id),
              deleteDialogOpen: false,
            }));
            window.location.href = "customers.html";
          }
        }
      });

      document.getElementById("edit-dialog-overlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) store.set({ editDialogOpen: false });
      });
      document.getElementById("delete-dialog-overlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) store.set({ deleteDialogOpen: false });
      });
    </script>
  </body>
</html>
