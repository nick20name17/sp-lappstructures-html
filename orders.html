<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapp Structures — Sales Orders</title>
    <link rel="icon" href="https://raw.githubusercontent.com/nick20name17/sp-lappstructures-html/main/img/shared/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <style>
      /* ───── Reset ───── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ───── Design tokens ───── */
      :root {
        --radius: 0.5rem;
        --background: oklch(0.93 0.011 257);
        --background-secondary: oklch(98.837% 0.00143 285.197);
        --foreground: oklch(0.14 0.033 262);
        --card: oklch(1 0 0);
        --card-foreground: oklch(0.22 0.03 255);
        --popover: oklch(1 0 0);
        --primary: oklch(0.53 0.18 260);
        --primary-foreground: oklch(1 0 0);
        --secondary: oklch(0.97 0.005 250);
        --secondary-foreground: oklch(0.14 0.033 262);
        --secondary-hover: oklch(0.93 0.011 257);
        --muted: oklch(0.97 0.005 250);
        --muted-foreground: oklch(0.56 0.023 255);
        --accent: oklch(0.96 0.03 260);
        --accent-foreground: oklch(0.53 0.18 260);
        --destructive: oklch(0.50 0.19 25);
        --success: oklch(0.58 0.16 150);
        --border: oklch(0.93 0.011 257);
        --input: oklch(0.92 0.01 250);
        --ring: oklch(0.53 0.18 260);

        --sidebar: oklch(1 0 0);
        --sidebar-foreground: oklch(0.55 0.02 255);
        --sidebar-primary: oklch(0.53 0.18 260);
        --sidebar-accent: oklch(0.97 0.005 250);
        --sidebar-accent-foreground: oklch(0.14 0.033 262);
        --sidebar-border: oklch(0.92 0.01 250);

        --brand-navy: #163259;
        --font-body: "Inter", sans-serif;
        --font-display: "SF Pro Display", "Inter", sans-serif;

        /* Status badge palette */
        --amber-bg: #fef3c7;
        --amber-fg: #92400e;
        --green-bg: #d1fae5;
        --green-fg: #065f46;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: var(--font-body);
        background: var(--background);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        overflow: hidden;
      }

      button {
        cursor: pointer;
        font-family: inherit;
        border: 0;
        background: transparent;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ───── Scrollbar ───── */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: color-mix(in oklch, var(--muted-foreground) 30%, transparent);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: color-mix(in oklch, var(--muted-foreground) 50%, transparent);
      }

      /* ───── App layout ───── */
      .app-shell {
        background: var(--background);
        padding: 16px;
        height: 100vh;
      }

      .app-frame {
        display: flex;
        height: calc(100vh - 32px);
        border-radius: 12px;
        overflow: hidden;
      }

      /* ───── Sidebar ───── */
      .sidebar {
        display: flex;
        flex-direction: column;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        flex-shrink: 0;
        overflow: hidden;
        width: 240px;
        transition: width 0.2s ease;
      }

      .sidebar.collapsed {
        width: 56px;
      }

      .sidebar-logo {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        padding: 0 16px 16px;
        height: 64px;
        flex-shrink: 0;
        transition: opacity 0.15s ease;
      }

      .sidebar-logo:hover {
        opacity: 0.9;
      }

      .sidebar.collapsed .sidebar-logo {
        justify-content: center;
        padding: 0 0 16px;
        gap: 0;
      }

      .sidebar-logo-mark {
        display: flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .sidebar-logo-mark img {
        width: 24px;
        height: 24px;
      }

      .sidebar-logo-text {
        font-family: var(--font-display);
        font-size: 1.25rem;
        line-height: 1.2;
        font-weight: 500;
        letter-spacing: 0.025em;
        color: var(--brand-navy);
        white-space: nowrap;
        overflow: hidden;
        transition: opacity 0.2s ease, width 0.2s ease;
      }

      .sidebar.collapsed .sidebar-logo-text {
        width: 0;
        opacity: 0;
      }

      .sidebar-search {
        position: relative;
        padding: 0 8px 4px;
      }

      .sidebar-search-input-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 6px;
        border: 1px solid transparent;
        background: color-mix(in oklch, var(--sidebar-accent) 40%, transparent);
        padding: 6px 10px;
        transition: background 0.15s ease, border-color 0.15s ease;
      }

      .sidebar-search-input-wrap:hover,
      .sidebar-search-input-wrap.is-open {
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
      }

      .sidebar-search-input-wrap.is-open {
        border-color: color-mix(
          in oklch,
          var(--sidebar-foreground) 20%,
          transparent
        );
      }

      .sidebar-search-icon {
        width: 14px;
        height: 14px;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        flex-shrink: 0;
      }

      .sidebar-search-input {
        flex: 1;
        min-width: 0;
        background: transparent;
        font-size: 0.875rem;
        font-family: inherit;
        color: var(--sidebar-foreground);
        border: 0;
        outline: none;
      }

      .sidebar-search-input::placeholder {
        color: color-mix(in oklch, var(--sidebar-foreground) 40%, transparent);
      }

      .sidebar-search-dropdown {
        position: absolute;
        bottom: 100%;
        left: 4px;
        right: 4px;
        margin-bottom: 4px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--popover);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1),
          0 8px 10px -6px rgba(0, 0, 0, 0.04);
        overflow: hidden;
        z-index: 50;
      }

      .sidebar-search-dropdown-empty {
        padding: 16px 12px;
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted-foreground);
      }

      .sidebar-search-dropdown ul {
        list-style: none;
        max-height: 224px;
        overflow-y: auto;
        padding: 4px 0;
      }

      .sidebar-search-dropdown-item {
        display: block;
        width: 100%;
        padding: 8px 12px;
        text-align: left;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .sidebar-search-dropdown-item:hover {
        background: var(--accent);
      }

      .sidebar-search-dropdown-item-name {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.2;
      }

      .sidebar-search-dropdown-item-email {
        margin-top: 2px;
        font-size: 0.75rem;
        color: var(--muted-foreground);
        line-height: 1.2;
      }

      .sidebar.collapsed .sidebar-search {
        padding: 0 8px 4px;
      }

      .sidebar.collapsed .sidebar-search-collapsed {
        height: 34px;
        padding-bottom: 4px;
        background: color-mix(in oklch, var(--sidebar-accent) 40%, transparent);
        margin: 0 8px;
        display: flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        justify-content: center;
        align-items: center;
      }

      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 16px 8px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .sidebar-section-title {
        padding: 0 12px;
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        white-space: nowrap;
        overflow: hidden;
        transition: opacity 0.2s ease, height 0.2s ease;
      }

      .sidebar.collapsed .sidebar-section-title {
        opacity: 0;
        height: 0;
        margin-bottom: 0;
      }

      .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .sidebar-nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px 6px 6px;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--sidebar-foreground);
        transition: background 0.15s ease, color 0.15s ease;
      }

      .sidebar-nav-link:hover {
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
        color: var(--sidebar-accent-foreground);
      }

      .sidebar-nav-link.active {
        background: var(--sidebar-accent);
        color: var(--sidebar-accent-foreground);
      }

      .sidebar-nav-link-icon {
        padding: 4px;
        border-radius: 4px;
        background: var(--sidebar-accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s ease;
      }

      .sidebar-nav-link.active .sidebar-nav-link-icon {
        background: var(--sidebar);
      }

      .sidebar-nav-link-icon svg {
        width: 16px;
        height: 16px;
      }

      .sidebar-nav-link-label {
        white-space: nowrap;
        overflow: hidden;
        transition: opacity 0.2s ease, width 0.2s ease;
      }

      .sidebar.collapsed .sidebar-nav-link-label {
        width: 0;
        opacity: 0;
      }

      .sidebar-nav-link-badge {
        margin-left: auto;
        display: inline-flex;
        gap: 4px;
      }

      .sidebar.collapsed .sidebar-nav-link-badge {
        display: none;
      }

      .sidebar-badge {
        display: inline-flex;
        width: 20px;
        height: 20px;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        font-size: 10px;
        font-weight: 600;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        padding: 0 4px;
      }

      .sidebar-badge.amber {
        background: rgba(245, 158, 11, 0.2);
        color: rgb(180, 83, 9);
      }

      .sidebar-badge.blue {
        background: rgba(59, 130, 246, 0.2);
        color: rgb(29, 78, 216);
      }

      .sidebar-bottom {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 0 8px 16px;
        flex-shrink: 0;
      }

      .sidebar-collapse-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 6px 10px 6px 6px;
        border-radius: 6px;
        color: var(--sidebar-foreground);
        font-size: 0.875rem;
        font-weight: 500;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .sidebar-collapse-btn:hover {
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
        color: var(--sidebar-accent-foreground);
      }

      .sidebar-collapse-btn-icon {
        padding: 4px;
        border-radius: 4px;
        background: var(--sidebar-accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .sidebar-collapse-btn:hover .sidebar-collapse-btn-icon {
        background: var(--sidebar);
      }

      .sidebar-collapse-btn-icon svg {
        width: 16px;
        height: 16px;
      }

      .sidebar-collapse-btn-label {
        white-space: nowrap;
        overflow: hidden;
        transition: opacity 0.2s ease, width 0.2s ease;
      }

      .sidebar.collapsed .sidebar-collapse-btn-label {
        width: 0;
        opacity: 0;
      }

      .sidebar-user {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 6px;
        border-radius: 6px;
      }

      .sidebar.collapsed .sidebar-user {
        justify-content: center;
      }

      .sidebar-user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 9999px;
        background: var(--primary);
        color: var(--primary-foreground);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
        flex-shrink: 0;
      }

      .sidebar-user-text {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .sidebar.collapsed .sidebar-user-text,
      .sidebar.collapsed .sidebar-user-logout {
        display: none;
      }

      .sidebar-user-name {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--sidebar-foreground);
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar-user-email {
        font-size: 0.75rem;
        line-height: 1.2;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar-user-logout {
        flex-shrink: 0;
        padding: 4px;
        border-radius: 6px;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        transition: background 0.15s ease, color 0.15s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-user-logout:hover {
        color: var(--sidebar-foreground);
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
      }

      .sidebar-user-logout svg {
        width: 16px;
        height: 16px;
      }

      /* ───── Main ───── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--background-secondary);
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      /* ───── Page header ───── */
      .page-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px 16px;
        background: var(--background-secondary);
      }
      @media (min-width: 640px) {
        .page-header {
          padding: 16px;
        }
      }

      .page-header-title-wrap {
        min-width: 0;
      }

      .page-header-title {
        font-size: 1.125rem;
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: -0.025em;
        color: color-mix(in oklch, var(--foreground) 70%, transparent);
      }
      @media (min-width: 640px) {
        .page-header-title {
          font-size: 1.25rem;
        }
      }

      .page-header-description {
        margin-top: 2px;
        font-size: 0.875rem;
        color: var(--muted-foreground);
      }

      .page-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      /* ───── Buttons ───── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        height: 36px;
        padding: 8px 16px;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .btn:disabled {
        pointer-events: none;
        opacity: 0.5;
      }

      .btn-primary {
        background: var(--primary);
        color: var(--primary-foreground);
      }

      .btn-primary:hover {
        background: color-mix(in oklch, var(--primary) 90%, black);
      }

      .btn-outline {
        background: white;
        color: var(--foreground);
        border: 1px solid var(--border);
      }

      .btn-outline:hover {
        background: var(--secondary);
      }

      .btn-ghost {
        background: transparent;
        color: var(--muted-foreground);
      }

      .btn-ghost:hover {
        background: var(--secondary);
        color: var(--foreground);
      }

      .btn-icon {
        height: 32px;
        width: 32px;
        padding: 0;
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* ───── Search box (in PageHeader) ───── */
      .search-box {
        position: relative;
      }

      .search-box-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--muted-foreground);
        pointer-events: none;
      }

      .search-box-input {
        height: 36px;
        width: 100%;
        padding: 0 28px 0 32px;
        border: 1px solid var(--input);
        background: var(--card);
        border-radius: 6px;
        font-size: 0.875rem;
        font-family: inherit;
        color: var(--foreground);
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      @media (min-width: 640px) {
        .search-box-input {
          width: 224px;
        }
      }

      .search-box-input::placeholder {
        color: var(--muted-foreground);
      }

      .search-box-input:focus {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring) 20%, transparent);
      }

      .search-box-clear {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        padding: 2px;
        border-radius: 4px;
        color: var(--muted-foreground);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .search-box-clear:hover {
        color: var(--foreground);
      }

      .search-box-clear svg {
        width: 14px;
        height: 14px;
      }

      /* ───── Body wrapper ───── */
      .body {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 16px;
      }

      /* ───── Data table ───── */
      .table-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: var(--sidebar);
      }

      .table-scroll {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }

      table.data-table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      .data-table thead th {
        position: sticky;
        top: 0;
        background: var(--sidebar);
        text-align: left;
        font-weight: 500;
        color: var(--muted-foreground);
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        z-index: 1;
      }

      .data-table thead .th-inner {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-transform: capitalize;
      }

      .data-table thead .th-sortable {
        cursor: pointer;
        user-select: none;
      }

      .data-table thead .th-sortable:hover {
        color: var(--foreground);
      }

      .data-table thead .th-inner svg {
        width: 14px;
        height: 14px;
      }

      .data-table thead .th-inner .icon-unsorted {
        opacity: 0.4;
      }

      .data-table tbody td {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .data-table tbody tr:last-child td {
        border-bottom: 0;
      }

      .data-table tbody tr.clickable {
        cursor: pointer;
      }

      .data-table tbody tr.clickable:hover td {
        background: color-mix(in oklch, var(--muted) 50%, transparent);
      }

      .data-table .col-empty,
      .data-table .col-error {
        padding: 32px 12px;
        text-align: center;
        color: var(--muted-foreground);
        font-size: 0.875rem;
        white-space: normal;
      }

      .data-table .col-error {
        color: var(--destructive);
      }

      .cell-link {
        color: var(--accent-foreground);
      }

      .cell-link:hover {
        text-decoration: underline;
      }

      .cell-overflow {
        display: inline-block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        vertical-align: middle;
      }

      .cell-dash {
        color: var(--muted-foreground);
      }

      /* ───── Skeleton ───── */
      .skeleton {
        display: inline-block;
        height: 14px;
        background: linear-gradient(
          90deg,
          color-mix(in oklch, var(--muted) 70%, transparent) 25%,
          color-mix(in oklch, var(--border) 70%, transparent) 50%,
          color-mix(in oklch, var(--muted) 70%, transparent) 75%
        );
        background-size: 200% 100%;
        animation: skeleton-pulse 1.4s ease-in-out infinite;
        border-radius: 4px;
      }

      @keyframes skeleton-pulse {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ───── Stage badge (progress-bar-on-pill) ───── */
      .stage-badge {
        position: relative;
        display: inline-flex;
        height: 28px;
        width: 100%;
        max-width: 180px;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 9999px;
        border: 1px solid color-mix(in oklch, var(--primary) 40%, transparent);
        background: color-mix(in oklch, var(--primary) 10%, transparent);
      }

      .stage-badge-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        background: color-mix(in oklch, var(--primary) 25%, transparent);
      }

      .stage-badge-label {
        position: relative;
        z-index: 1;
        font-size: 0.75rem;

        align-items: center;

        color: var(--green-fg);

      .pagination-bar {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        font-size: 0.875rem;
        color: var(--muted-foreground);

        display: flex;
        align-items: center;
        gap: 8px;

          display: none;

        height: 32px;
        width: 80px;
        padding: 0 8px;
        border: 1px solid var(--input);
        border-radius: 6px;
        background: var(--card);
        color: var(--foreground);
        font-size: 0.875rem;
        font-family: inherit;
        outline: none;

        align-items: center;
        gap: 8px;

        align-items: center;
        gap: 4px;

        width: 32px;
        padding: 0;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--foreground);
        border-radius: 6px;

        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;

        background: var(--secondary);

        opacity: 0.4;
        cursor: not-allowed;
      }

        width: 16px;
        height: 16px;
      }

      /* ───── Drawer (Sheet) ───── */
      .drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 100;
      }

        opacity: 1;
        pointer-events: auto;
      }

      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-width: 900px;
        background: var(--background-secondary);
        box-shadow: -8px 0 24px rgba(0, 0, 0, 0.08);
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 110;
        display: flex;
        flex-direction: column;
      }

      .drawer.is-open {
        transform: translateX(0);
      }

      .drawer-header {
        flex-shrink: 0;
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;

      .drawer-title {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--foreground);
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .drawer-open-full {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        height: 32px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--muted-foreground);
        border-radius: 6px;

      .drawer-open-full:hover {
        background: var(--secondary);
        color: var(--foreground);
      }

      .drawer-open-full svg {
        width: 16px;
        height: 16px;
      }

      .drawer-close {
        height: 32px;
        width: 32px;
        padding: 0;
        border-radius: 6px;
        color: var(--muted-foreground);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .drawer-close:hover {
        background: var(--secondary);
        color: var(--foreground);
      }

        width: 18px;
        height: 18px;

      .drawer-body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;

      /* ───── Store ───── */
      function createStore(initialState) {
        let state = structuredClone(initialState);
        const listeners = new Set();
        return {
          get: () => state,
          set(updater) {
            state =
              typeof updater === "function"
                ? updater(state)
                : { ...state, ...updater };
            listeners.forEach((fn) => fn(state));
          },
          subscribe(fn) {
            listeners.add(fn);
            return () => listeners.delete(fn);
          },
        };
      }

      /* ───── Icons ───── */
      const ICONS = {
        list: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h.01M3 18h.01M3 6h.01M8 12h13M8 18h13M8 6h13"/></svg>',
        userRound:

      /* ───── Format helpers ───── */
      function formatDate(value) {
        if (!value) return "—";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleDateString("en-US", {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      function formatCurrency(value) {
        if (value == null) return "—";
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
        }).format(value);
      }

      function getShippingAddress(o) {
        if (!o.ship_zip && !o.ship_city) return "—";
        const parts = [o.ship_city, o.ship_state].filter(Boolean).join(" ");
        return o.ship_zip ? `${parts} - ${o.ship_zip}` : parts;
      }

      function esc(v) {
        if (v == null) return "";
        return String(v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /* ───── Filter + sort + paginate ───── */
      function getFilteredOrders() {
        const s = store.get();
        const term = s.searchTerm.trim().toLowerCase();
        let rows = s.orders;
        if (term) {
          rows = rows.filter((o) => {
            return (
              o.invoice.toLowerCase().includes(term) ||
              (o.customer && o.customer.toLowerCase().includes(term)) ||
              (o.po_no && o.po_no.toLowerCase().includes(term)) ||
              (o.category && o.category.toLowerCase().includes(term)) ||
              (o.memo && o.memo.toLowerCase().includes(term))
            );
          });
        }
        if (s.sort.key && s.sort.dir) {
          const { key, dir } = s.sort;
          rows = [...rows].sort((a, b) => {
            const av = a[key];
            const bv = b[key];
            if (av == null && bv == null) return 0;
            if (av == null) return 1;
            if (bv == null) return -1;
            if (typeof av === "number" && typeof bv === "number")
              return dir === "asc" ? av - bv : bv - av;
            const as = String(av).toLowerCase();
            const bs = String(bv).toLowerCase();
            if (as < bs) return dir === "asc" ? -1 : 1;
            if (as > bs) return dir === "asc" ? 1 : -1;
            return 0;
          });
        }
        return rows;
      }

      function getPagedOrders() {
        const rows = getFilteredOrders();
        const s = store.get();
        const start = (s.page - 1) * s.pageSize;
        return { rows: rows.slice(start, start + s.pageSize), totalCount: rows.length };
      }

      function setSort(key) {
        store.set((s) => {
          if (s.sort.key !== key) return { sort: { key, dir: "asc" } };
          if (s.sort.dir === "asc") return { sort: { key, dir: "desc" } };
          return { sort: { key: null, dir: null } };
        });
      }

      function setPage(n) {

          orders: s.orders.filter((o) => o.autoid !== autoid),
          previewOrder:
            s.previewOrder && s.previewOrder.autoid === autoid
              ? null
              : s.previewOrder,
        }));
      }
      // Expose for console / future button wiring
      window.deleteOrder = deleteOrder;

      /* ───── Render: stage badge ───── */
      function renderStageBadge(status, comment) {
        const label = status ? STATUS_LABELS[status] : "Order created";
        const progress = status ? getOverallProgress(status) : 0;
        return `
          <div class="stage-badge" data-comment="${comment}" data-component="badge" role="img" aria-label="Stage: ${label} (${progress}% complete)">
            <div class="stage-badge-fill" data-comment="${comment}-fill" style="width:${progress}%" aria-hidden="true"></div>
            <span class="stage-badge-label" data-comment="${comment}-label">${esc(label)}</span>
          </div>
        `;
      }

      /* ───── Render: sort indicator ───── */
      function renderSortIcons() {
        const s = store.get();
        document.querySelectorAll("[data-sort-icon]").forEach((el) => {
          const th = el.closest("th");
          const key = th.dataset.sortKey;
          if (!key) {
            el.innerHTML = "";
            return;
          }
          if (s.sort.key === key && s.sort.dir === "asc") el.innerHTML = ICONS.sortUp;
          else if (s.sort.key === key && s.sort.dir === "desc")
            el.innerHTML = ICONS.sortDown;
          else el.innerHTML = ICONS.sortUnsorted;
        });
      }

      /* ───── Render: rows ───── */
      function renderRows() {
        const s = store.get();
        const tbody = document.getElementById("orders-table-body");

        if (s.isLoading) {
          tbody.innerHTML = Array.from({ length: 5 })
            .map(
              (_, i) => `
              <tr data-comment="orders-skeleton-row-${i}">
                <td><span class="skeleton" style="width:80%"></span></td>
                <td><span class="skeleton" style="width:70%"></span></td>
                <td><span class="skeleton" style="width:60%"></span></td>
                <td><span class="skeleton" style="width:85%"></span></td>
                <td><span class="skeleton" style="width:70%"></span></td>
                <td><span class="skeleton" style="width:65%"></span></td>
                <td><span class="skeleton" style="width:60%"></span></td>
                <td><span class="skeleton" style="width:50%"></span></td>
              </tr>
            `,
            )
            .join("");
          return;
        }

        const { rows } = getPagedOrders();

        if (rows.length === 0) {
          tbody.innerHTML = `
            <tr data-comment="orders-empty-row">
              <td colspan="8" class="col-empty" data-comment="orders-empty-cell">No orders found.</td>
            </tr>
          `;
          return;
        }

        tbody.innerHTML = rows
          .map((o) => {
            const idSafe = esc(o.autoid);
            return `
              <tr class="clickable" data-comment="orders-row-${idSafe}" data-row-id="${idSafe}">
                <td data-comment="orders-row-${idSafe}-invoice">${esc(o.invoice)}</td>
                <td data-comment="orders-row-${idSafe}-created">${esc(formatDate(o.crea_date))}</td>
                <td data-comment="orders-row-${idSafe}-category"><span class="cell-overflow">${esc(o.category || "—")}</span></td>
                <td data-comment="orders-row-${idSafe}-stage">${renderStageBadge(o.status, `orders-row-${idSafe}-stage-badge`)}</td>
                <td data-comment="orders-row-${idSafe}-customer">
                  <a class="cell-link cell-overflow" data-comment="orders-row-${idSafe}-customer-link" href="customer-detail.html?id=${esc(o.customer_id)}" onclick="event.stopPropagation()">${esc(o.customer || "—")}</a>
                </td>
                <td data-comment="orders-row-${idSafe}-scheduled">${esc(formatDate(o.dp_estprod))}</td>
                <td data-comment="orders-row-${idSafe}-ship-type">${esc(o.ship_type || "—")}</td>
                <td data-comment="orders-row-${idSafe}-total">${esc(formatCurrency(o.total))}</td>
              </tr>
            `;
          })
          .join("");
      }

      /* ───── Render: search input + clear button ───── */
      function renderSearchInput() {
        const s = store.get();
        const input = document.getElementById("orders-search-input");
        if (input.value !== s.searchInput) input.value = s.searchInput;
        document.getElementById("orders-search-clear").style.display = s.searchInput
          ? "inline-flex"
          : "none";
      }

      /* ───── Render: pagination ───── */
      function renderPagination() {
        const s = store.get();
        const { totalCount } = getPagedOrders();
        const totalPages = Math.max(1, Math.ceil(totalCount / s.pageSize));
        const page = Math.min(s.page, totalPages);
        if (page !== s.page) {
          store.set({ page });
          return;
        }
        document.getElementById("orders-pagination-label").textContent =
          `Page ${page} of ${totalPages}`;
        document.getElementById("orders-pagination-size").value = String(s.pageSize);
        const atFirst = page <= 1;
        const atLast = page >= totalPages;
        document.getElementById("orders-pagination-first").disabled = atFirst;
        document.getElementById("orders-pagination-prev").disabled = atFirst;
        document.getElementById("orders-pagination-next").disabled = atLast;
        document.getElementById("orders-pagination-last").disabled = atLast;
      }

      /* ───── Render: drawer ───── */
      function renderDrawer() {
        const s = store.get();
        const overlay = document.getElementById("orders-drawer-overlay");
        const drawer = document.getElementById("orders-drawer");
        const body = document.getElementById("orders-drawer-body");
        const open = s.previewOrder !== null;
        overlay.classList.toggle("is-open", open);
        drawer.classList.toggle("is-open", open);
        drawer.setAttribute("aria-hidden", String(!open));
        if (!open) {
          body.innerHTML = "";
          return;
        }
        const o = s.previewOrder;
        document.getElementById("orders-drawer-title").textContent =
          `Sales Order ${o.invoice}`;

        const statusColor = getStatusColor(o.status);
        const statusLabel = o.status ? STATUS_LABELS[o.status] : "—";
        const subtotal = o.total / 1.06;
        const tax = o.total - subtotal;

        body.innerHTML = `
          <section class="drawer-card" data-comment="orders-drawer-summary-card" data-component="card">
            <h3 class="drawer-card-title" data-comment="orders-drawer-summary-title">Order Summary</h3>
            <div class="drawer-detail-grid" data-comment="orders-drawer-summary-grid">
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-invoice">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-invoice-label">Invoice</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-invoice-value">${esc(o.invoice)}</span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-created">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-created-label">Created</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-created-value">${esc(formatDate(o.crea_date))}</span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-customer">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-customer-label">Customer</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-customer-value">${esc(o.customer || "—")}</span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-po">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-po-label">PO #</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-po-value">${esc(o.po_no || "—")}</span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-category">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-category-label">Category</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-category-value">${esc(o.category || "—")}</span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-dimension">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-dimension-label">Dimension</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-dimension-value">${esc(o.dimension || "—")}</span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-status">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-status-label">Status</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-status-value">
                  ${
                    statusColor
                      ? `<span class="status-pill ${statusColor}" data-comment="orders-drawer-detail-status-pill" data-component="badge">${esc(statusLabel)}</span>`
                      : esc(statusLabel)
                  }
                </span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-scheduled">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-scheduled-label">Scheduled Delivery</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-scheduled-value">${esc(formatDate(o.dp_estprod))}</span>
              </div>
              <div class="drawer-detail-row" data-comment="orders-drawer-detail-ship-type">
                <span class="drawer-detail-label" data-comment="orders-drawer-detail-ship-type-label">Ship Type</span>
                <span class="drawer-detail-value" data-comment="orders-drawer-detail-ship-type-value">${esc(o.ship_type || "—")}</span>
              </div>
            </div>
          </section>

          <section class="drawer-card" data-comment="orders-drawer-stage-card" data-component="card">
            <h3 class="drawer-card-title" data-comment="orders-drawer-stage-title">Workflow Stage</h3>
            ${renderStageBadge(o.status, "orders-drawer-stage-badge")}
          </section>

          <section class="drawer-card" data-comment="orders-drawer-shipping-card" data-component="card">
            <h3 class="drawer-card-title" data-comment="orders-drawer-shipping-title">Shipping Address</h3>
            <p class="drawer-detail-value" data-comment="orders-drawer-shipping-value">${esc(getShippingAddress(o))}</p>
          </section>

          <section class="drawer-card" data-comment="orders-drawer-memo-card" data-component="card">
            <h3 class="drawer-card-title" data-comment="orders-drawer-memo-title">Memo</h3>
            <p class="drawer-detail-value" data-comment="orders-drawer-memo-value">${esc(o.memo || "—")}</p>
          </section>

          <section class="drawer-card" data-comment="orders-drawer-totals-card" data-component="card">
            <h3 class="drawer-card-title" data-comment="orders-drawer-totals-title">Totals</h3>
            <div class="drawer-summary" data-comment="orders-drawer-totals-summary">
              <div class="drawer-summary-row" data-comment="orders-drawer-totals-subtotal">
                <span class="label" data-comment="orders-drawer-totals-subtotal-label">Subtotal</span>
                <span class="value" data-comment="orders-drawer-totals-subtotal-value">${esc(formatCurrency(subtotal))}</span>
              </div>
              <div class="drawer-summary-row" data-comment="orders-drawer-totals-tax">
                <span class="label" data-comment="orders-drawer-totals-tax-label">Tax (6%)</span>
                <span class="value" data-comment="orders-drawer-totals-tax-value">${esc(formatCurrency(tax))}</span>
              </div>
              <div class="drawer-summary-row total" data-comment="orders-drawer-totals-grand">
                <span class="label" data-comment="orders-drawer-totals-grand-label">Total</span>
                <span class="value" data-comment="orders-drawer-totals-grand-value">${esc(formatCurrency(o.total))}</span>
              </div>
            </div>
          </section>
        `;
      }

      /* ───── Subscribe ───── */
      store.subscribe(renderSidebarNav);
      store.subscribe(renderUser);
      store.subscribe(renderCollapse);
      store.subscribe(renderSidebarSearch);
      store.subscribe(renderRows);
      store.subscribe(renderSearchInput);
      store.subscribe(renderPagination);
      store.subscribe(renderSortIcons);
      store.subscribe(renderDrawer);

      renderSidebarNav();
      renderUser();
      renderCollapse();
      renderSidebarSearch();
      renderRows();
      renderSearchInput();
      renderPagination();
      renderSortIcons();
      renderDrawer();

      /* ───── Initial loading simulation ───── */
      setTimeout(() => store.set({ isLoading: false }), 300);

      /* ───── Sidebar event handlers ───── */
      document
        .getElementById("sidebar-collapse-btn")
        .addEventListener("click", () => {
          store.set((s) => ({ collapsed: !s.collapsed }));
        });

      const sidebarSearchInput = document.getElementById("sidebar-search-input");
      sidebarSearchInput.addEventListener("focus", () =>
        store.set({ searchOpen: true }),
      );
      sidebarSearchInput.addEventListener("blur", () =>
        setTimeout(() => store.set({ searchOpen: false }), 150),
      );
      sidebarSearchInput.addEventListener("input", (e) =>
        store.set({ sidebarSearchTerm: e.target.value }),
      );

      document
        .getElementById("sidebar-search-list")
        .addEventListener("mousedown", (e) => {
          const btn = e.target.closest("[data-customer-id]");
          if (!btn) return;
          const id = btn.dataset.customerId;
          sidebarSearchInput.value = "";
          store.set({ searchOpen: false, sidebarSearchTerm: "" });
          window.location.href = `customer-detail.html?id=${id}`;
        });

      document
        .getElementById("sidebar-user-logout")
        .addEventListener("click", () => {
          window.location.href = "login.html";
        });

      /* ───── Page event handlers ───── */
      const ordersSearchInput = document.getElementById("orders-search-input");
      ordersSearchInput.addEventListener("input", (e) => setSearch(e.target.value));
      ordersSearchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") setSearch(e.target.value);
      });
      document
        .getElementById("orders-search-clear")
        .addEventListener("click", () => {
          clearSearch();
          ordersSearchInput.focus();
        });

      document.querySelectorAll("th[data-sort-key]").forEach((th) => {
        th.addEventListener("click", () => setSort(th.dataset.sortKey));
      });

      document
        .getElementById("orders-table-body")
        .addEventListener("click", (e) => {
          const tr = e.target.closest("tr[data-row-id]");
          if (!tr) return;
          if (e.target.closest("a")) return;
          const order = store.get().orders.find((o) => o.autoid === tr.dataset.rowId);
          if (order) openPreview(order);
        });

      document
        .getElementById("orders-pagination-size")
        .addEventListener("change", (e) => setPageSize(Number(e.target.value)));
      document
        .getElementById("orders-pagination-first")
        .addEventListener("click", () => setPage(1));
      document
        .getElementById("orders-pagination-prev")
        .addEventListener("click", () =>
          setPage(Math.max(1, store.get().page - 1)),
        );
      document
        .getElementById("orders-pagination-next")
        .addEventListener("click", () => {
          const { totalCount } = getPagedOrders();
          const totalPages = Math.max(
            1,
            Math.ceil(totalCount / store.get().pageSize),
          );
          setPage(Math.min(totalPages, store.get().page + 1));
        });
      document
        .getElementById("orders-pagination-last")
        .addEventListener("click", () => {
          const { totalCount } = getPagedOrders();
          const totalPages = Math.max(
            1,
            Math.ceil(totalCount / store.get().pageSize),
          );
          setPage(totalPages);
        });

      /* ───── Drawer handlers ───── */
      document
        .getElementById("orders-drawer-close")
        .addEventListener("click", () => closePreview());
      document
        .getElementById("orders-drawer-overlay")
        .addEventListener("click", () => closePreview());
      document
        .getElementById("orders-drawer-open-full")
        .addEventListener("click", () => {
          const o = store.get().previewOrder;
          if (o) window.location.href = `order-detail.html?id=${o.autoid}`;
        });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && store.get().previewOrder) closePreview();
      });

      /* ───── Reveal ───── */
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting)
              entry.target.classList.add("is-visible");
          });
        },
        { threshold: 0.1 },
      );
      document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    </script>
  </body>
</html>
