<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapp Structures — Edit Site Check</title>
    <link rel="icon" href="https://raw.githubusercontent.com/nick20name17/sp-lappstructures-html/main/img/shared/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --radius: 0.5rem;
        --background: oklch(0.93 0.011 257);
        --background-secondary: oklch(98.837% 0.00143 285.197);
        --foreground: oklch(0.14 0.033 262);
        --card: oklch(1 0 0);
        --card-foreground: oklch(0.22 0.03 255);
        --popover: oklch(1 0 0);
        --primary: oklch(0.53 0.18 260);
        --primary-foreground: oklch(1 0 0);
        --secondary: oklch(0.97 0.005 250);
        --secondary-foreground: oklch(0.14 0.033 262);
        --secondary-hover: oklch(0.93 0.011 257);
        --muted: oklch(0.97 0.005 250);
        --muted-foreground: oklch(0.56 0.023 255);
        --accent: oklch(0.96 0.03 260);
        --accent-foreground: oklch(0.53 0.18 260);
        --destructive: oklch(0.50 0.19 25);
        --success: oklch(0.58 0.16 150);
        --border: oklch(0.93 0.011 257);
        --input: oklch(0.92 0.01 250);
        --ring: oklch(0.53 0.18 260);

        --sidebar: oklch(1 0 0);
        --sidebar-foreground: oklch(0.55 0.02 255);
        --sidebar-primary: oklch(0.53 0.18 260);
        --sidebar-accent: oklch(0.97 0.005 250);
        --sidebar-accent-foreground: oklch(0.14 0.033 262);
        --sidebar-border: oklch(0.92 0.01 250);

        --brand-navy: #163259;
        --font-body: "Inter", sans-serif;
        --font-display: "SF Pro Display", "Inter", sans-serif;
      }

      html, body { height: 100%; }
      body {
        font-family: var(--font-body);
        background: var(--background);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        overflow: hidden;
      }
      button { cursor: pointer; font-family: inherit; border: 0; background: transparent; }
      a { color: inherit; text-decoration: none; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: color-mix(in oklch, var(--muted-foreground) 30%, transparent);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: color-mix(in oklch, var(--muted-foreground) 50%, transparent);
      }

      .app-shell { background: var(--background); padding: 16px; height: 100vh; }
      .app-frame { display: flex; height: calc(100vh - 32px); border-radius: 12px; overflow: hidden; }

      /* Sidebar */
      .sidebar {
        display: flex; flex-direction: column;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        flex-shrink: 0; overflow: hidden;
        width: 240px; transition: width 0.2s ease;
      }
      .sidebar.collapsed { width: 56px; }
      .sidebar-logo {
        display: flex; align-items: flex-end; gap: 10px;
        padding: 0 16px 16px; height: 64px;
        flex-shrink: 0; transition: opacity 0.15s ease;
      }
      .sidebar-logo:hover { opacity: 0.9; }
      .sidebar.collapsed .sidebar-logo { justify-content: center; padding: 0 0 16px; gap: 0; }
      .sidebar-logo-mark { display: flex; width: 32px; height: 32px; align-items: center; justify-content: center; flex-shrink: 0; }
      .sidebar-logo-mark img { width: 24px; height: 24px; }
      .sidebar-logo-text {
        font-family: var(--font-display);
        font-size: 1.25rem; line-height: 1.2;
        font-weight: 500; letter-spacing: 0.025em;
        color: var(--brand-navy);
        white-space: nowrap; overflow: hidden;
        transition: opacity 0.2s ease, width 0.2s ease;
      }
      .sidebar.collapsed .sidebar-logo-text { width: 0; opacity: 0; }

      .sidebar-search { position: relative; padding: 0 8px 4px; }
      .sidebar-search-input-wrap {
        display: flex; align-items: center; gap: 8px;
        border-radius: 6px; border: 1px solid transparent;
        background: color-mix(in oklch, var(--sidebar-accent) 40%, transparent);
        padding: 6px 10px;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .sidebar-search-input-wrap:hover,
      .sidebar-search-input-wrap.is-open {
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
      }
      .sidebar-search-input-wrap.is-open {
        border-color: color-mix(in oklch, var(--sidebar-foreground) 20%, transparent);
      }
      .sidebar-search-icon {
        width: 14px; height: 14px;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        flex-shrink: 0;
      }
      .sidebar-search-input {
        flex: 1; min-width: 0; background: transparent;
        font-size: 0.875rem; font-family: inherit;
        color: var(--sidebar-foreground);
        border: 0; outline: none;
      }
      .sidebar-search-input::placeholder {
        color: color-mix(in oklch, var(--sidebar-foreground) 40%, transparent);
      }
      .sidebar-search-dropdown {
        position: absolute; bottom: 100%; left: 4px; right: 4px;
        margin-bottom: 4px; border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--popover);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        overflow: hidden; z-index: 50;
      }
      .sidebar-search-dropdown-empty {
        padding: 16px 12px; text-align: center;
        font-size: 0.75rem; color: var(--muted-foreground);
      }
      .sidebar-search-dropdown ul { list-style: none; max-height: 224px; overflow-y: auto; padding: 4px 0; }
      .sidebar-search-dropdown-item {
        display: block; width: 100%; padding: 8px 12px;
        text-align: left; font-family: inherit; cursor: pointer;
        transition: background 0.15s ease;
      }
      .sidebar-search-dropdown-item:hover { background: var(--accent); }
      .sidebar-search-dropdown-item-name { font-size: 0.875rem; font-weight: 500; line-height: 1.2; }
      .sidebar-search-dropdown-item-email { margin-top: 2px; font-size: 0.75rem; color: var(--muted-foreground); line-height: 1.2; }
      .sidebar.collapsed .sidebar-search { padding: 0 8px 4px; }
      .sidebar.collapsed .sidebar-search-collapsed {
        height: 34px; padding-bottom: 4px;
        background: color-mix(in oklch, var(--sidebar-accent) 40%, transparent);
        margin: 0 8px;
        display: flex; border: 1px solid var(--border);
        border-radius: 6px; justify-content: center; align-items: center;
      }

      .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 8px; display: flex; flex-direction: column; gap: 24px; }
      .sidebar-section { display: flex; flex-direction: column; gap: 4px; }
      .sidebar-nav-link {
        display: flex; align-items: center; gap: 12px;
        padding: 6px 10px 6px 6px; border-radius: 6px;
        font-size: 0.875rem; font-weight: 500;
        color: var(--sidebar-foreground);
        transition: background 0.15s ease, color 0.15s ease;
      }
      .sidebar-nav-link:hover { background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent); color: var(--sidebar-accent-foreground); }
      .sidebar-nav-link.active { background: var(--sidebar-accent); color: var(--sidebar-accent-foreground); }
      .sidebar-nav-link-icon {
        padding: 4px; border-radius: 4px;
        background: var(--sidebar-accent);
        display: inline-flex; align-items: center; justify-content: center;
        flex-shrink: 0; transition: background 0.15s ease;
      }
      .sidebar-nav-link.active .sidebar-nav-link-icon { background: var(--sidebar); }
      .sidebar-nav-link-icon svg { width: 16px; height: 16px; }
      .sidebar-nav-link-label { white-space: nowrap; overflow: hidden; transition: opacity 0.2s ease, width 0.2s ease; }
      .sidebar.collapsed .sidebar-nav-link-label { width: 0; opacity: 0; }
      .sidebar-nav-link-badge { margin-left: auto; display: inline-flex; gap: 4px; }
      .sidebar.collapsed .sidebar-nav-link-badge { display: none; }
      .sidebar-badge {
        display: inline-flex; width: 20px; height: 20px;
        align-items: center; justify-content: center;
        border-radius: 9999px;
        font-size: 10px; font-weight: 600; line-height: 1;
        font-variant-numeric: tabular-nums; padding: 0 4px;
      }
      .sidebar-badge.amber { background: rgba(245, 158, 11, 0.2); color: rgb(180, 83, 9); }
      .sidebar-badge.blue { background: rgba(59, 130, 246, 0.2); color: rgb(29, 78, 216); }

      .sidebar-bottom { display: flex; flex-direction: column; gap: 4px; padding: 0 8px 16px; flex-shrink: 0; }
      .sidebar-collapse-btn {
        display: flex; align-items: center; gap: 8px; width: 100%;
        padding: 6px 10px 6px 6px; border-radius: 6px;
        color: var(--sidebar-foreground);
        font-size: 0.875rem; font-weight: 500;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .sidebar-collapse-btn:hover { background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent); color: var(--sidebar-accent-foreground); }
      .sidebar-collapse-btn-icon {
        padding: 4px; border-radius: 4px;
        background: var(--sidebar-accent);
        display: inline-flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .sidebar-collapse-btn:hover .sidebar-collapse-btn-icon { background: var(--sidebar); }
      .sidebar-collapse-btn-icon svg { width: 16px; height: 16px; }
      .sidebar-collapse-btn-label { white-space: nowrap; overflow: hidden; transition: opacity 0.2s ease, width 0.2s ease; }
      .sidebar.collapsed .sidebar-collapse-btn-label { width: 0; opacity: 0; }
      .sidebar-user { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 6px; border-radius: 6px; }
      .sidebar.collapsed .sidebar-user { justify-content: center; }
      .sidebar-user-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .avatar {
        width: 32px; height: 32px; border-radius: 9999px;
        background: var(--primary); color: var(--primary-foreground);
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 0.75rem; font-weight: 600; flex-shrink: 0;
      }
      .sidebar-user-text { display: flex; flex-direction: column; min-width: 0; }
      .sidebar.collapsed .sidebar-user-text,
      .sidebar.collapsed .sidebar-user-logout { display: none; }
      .sidebar-user-name {
        font-size: 0.875rem; font-weight: 500; color: var(--sidebar-foreground);
        line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .sidebar-user-email {
        font-size: 0.75rem; line-height: 1.2;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .sidebar-user-logout {
        flex-shrink: 0; padding: 4px; border-radius: 6px;
        color: color-mix(in oklch, var(--sidebar-foreground) 50%, transparent);
        transition: background 0.15s ease, color 0.15s ease;
        display: inline-flex; align-items: center; justify-content: center;
      }
      .sidebar-user-logout:hover {
        color: var(--sidebar-foreground);
        background: color-mix(in oklch, var(--sidebar-accent) 60%, transparent);
      }
      .sidebar-user-logout svg { width: 16px; height: 16px; }

      /* Main */
      .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--background-secondary); }
      .main-content { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

      .page-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex; flex-wrap: wrap;
        align-items: center; justify-content: space-between;
        gap: 8px 16px;
        background: var(--background-secondary);
      }
      @media (min-width: 640px) { .page-header { padding: 16px; } }
      .page-header-title-wrap { min-width: 0; display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .page-header-title {
        font-size: 1.125rem; font-weight: 500;
        line-height: 1.2; letter-spacing: -0.025em;
        color: color-mix(in oklch, var(--foreground) 70%, transparent);
      }
      @media (min-width: 640px) { .page-header-title { font-size: 1.25rem; } }
      .page-header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

      /* Site check status badge */
      .sc-badge {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 2px 8px; border-radius: 9999px;
        border: 1px solid;
        font-size: 0.75rem; font-weight: 500;
      }
      .sc-badge .dot { display: inline-block; width: 8px; height: 8px; border-radius: 9999px; }
      .sc-badge.pending { background: rgb(238 242 255); color: rgb(67 56 202); border-color: rgb(165 180 252); }
      .sc-badge.pending .dot { background: rgb(99 102 241); }
      .sc-badge.in_progress { background: rgb(239 246 255); color: rgb(29 78 216); border-color: rgb(147 197 253); }
      .sc-badge.in_progress .dot { background: rgb(59 130 246); }
      .sc-badge.completed { background: rgb(236 253 245); color: rgb(4 120 87); border-color: rgb(110 231 183); }
      .sc-badge.completed .dot { background: rgb(16 185 129); }
      .sc-badge.cancelled { background: rgb(255 241 242); color: rgb(190 18 60); border-color: rgb(253 164 175); }
      .sc-badge.cancelled .dot { background: rgb(244 63 94); }

      /* Buttons */
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        gap: 6px; white-space: nowrap; border-radius: 6px;
        font-size: 0.875rem; font-weight: 500; font-family: inherit;
        height: 36px; padding: 8px 14px;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .btn-sm { height: 32px; padding: 6px 12px; font-size: 0.8125rem; }
      .btn:disabled { pointer-events: none; opacity: 0.5; }
      .btn-primary { background: var(--primary); color: var(--primary-foreground); }
      .btn-primary:hover { background: color-mix(in oklch, var(--primary) 90%, black); }
      .btn-outline { background: white; color: var(--foreground); border: 1px solid var(--border); }
      .btn-outline:hover { background: var(--secondary); }
      .btn-ghost { background: transparent; color: var(--muted-foreground); }
      .btn-ghost:hover { background: var(--secondary); color: var(--foreground); }
      .btn-destructive-outline {
        background: white; color: var(--destructive);
        border: 1px solid var(--destructive);
      }
      .btn-destructive-outline:hover { background: color-mix(in oklch, var(--destructive) 8%, white); }
      .btn-destructive { background: var(--destructive); color: var(--primary-foreground); }
      .btn-destructive:hover { background: color-mix(in oklch, var(--destructive) 90%, black); }
      .btn svg { width: 16px; height: 16px; }

      /* Form layout */
      .form-body { flex: 1; min-height: 0; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 16px; }
      @media (min-width: 640px) { .form-body { padding: 16px; gap: 24px; } }

      .form-section {
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--muted);
        padding: 10px;
      }
      @media (min-width: 640px) { .form-section { border-radius: 24px; padding: 14px; } }

      .form-block {
        background: var(--card);
        color: var(--card-foreground);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .form-block + .form-block { margin-top: 8px; }
      .form-block-title {
        font-size: 1rem; font-weight: 500;
        color: var(--foreground);
        margin-bottom: 12px;
        letter-spacing: -0.01em;
      }
      .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
      @media (min-width: 768px) {
        .form-grid.cols-2 { grid-template-columns: 1fr 1fr; gap: 12px 16px; }
      }
      .form-field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
      .form-field.full { grid-column: 1 / -1; }
      .form-label {
        font-size: 0.875rem; font-weight: 500;
        color: var(--foreground);
        display: inline-flex; align-items: center; gap: 2px;
      }
      .form-label .req { color: var(--destructive); margin-left: 1px; }

      .input,
      .textarea,
      .native-select {
        width: 100%;
        height: 36px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid var(--input);
        background: white;
        font-family: inherit;
        font-size: 0.875rem;
        color: var(--foreground);
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .input::placeholder, .textarea::placeholder { color: var(--muted-foreground); }
      .input:focus,
      .textarea:focus,
      .native-select:focus {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring) 15%, transparent);
      }
      .input.is-readonly,
      .textarea.is-readonly {
        background: var(--muted);
        color: var(--muted-foreground);
        opacity: 0.85;
      }
      .textarea {
        height: auto;
        min-height: 88px;
        padding: 10px 12px;
        resize: vertical;
        line-height: 1.5;
      }
      .native-select {
        appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");
        background-repeat: no-repeat;
        background-position: right 10px center;
        padding-right: 32px;
      }
      .input.is-error,
      .textarea.is-error,
      .native-select.is-error,
      .select-trigger.is-error {
        border-color: var(--destructive);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--destructive) 12%, transparent);
      }
      .field-error {
        font-size: 0.8125rem;
        color: var(--destructive);
        line-height: 1.2;
      }

      /* Combobox-style select trigger (search-select) */
      .search-select { position: relative; }
      .select-trigger {
        width: 100%;
        height: 36px;
        padding: 0 32px 0 12px;
        border-radius: 6px;
        border: 1px solid var(--input);
        background: white;
        font-family: inherit;
        font-size: 0.875rem;
        color: var(--foreground);
        text-align: left;
        display: inline-flex; align-items: center; justify-content: space-between;
        gap: 8px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .select-trigger:hover { border-color: color-mix(in oklch, var(--input) 50%, var(--muted-foreground)); }
      .select-trigger.is-open {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring) 15%, transparent);
      }
      .select-trigger-value { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .select-trigger-value.placeholder { color: var(--muted-foreground); }
      .select-trigger-chevron {
        flex-shrink: 0;
        color: var(--muted-foreground);
        display: inline-flex; align-items: center; justify-content: center;
        position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
        pointer-events: none;
      }
      .select-trigger-chevron svg { width: 16px; height: 16px; }

      .select-popover {
        position: absolute; top: calc(100% + 4px); left: 0; right: 0;
        z-index: 50;
        background: var(--popover);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        overflow: hidden;
        display: none;
      }
      .select-popover.is-open { display: block; }
      .select-search {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      .select-search svg { width: 14px; height: 14px; color: var(--muted-foreground); flex-shrink: 0; }
      .select-search input {
        flex: 1; min-width: 0;
        font-family: inherit; font-size: 0.875rem;
        background: transparent; border: 0; outline: none;
        color: var(--foreground);
      }
      .select-search input::placeholder { color: var(--muted-foreground); }
      .select-list {
        list-style: none;
        max-height: 220px;
        overflow-y: auto;
        padding: 4px 0;
      }
      .select-option {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        padding: 8px 12px;
        font-size: 0.875rem;
        color: var(--foreground);
        cursor: pointer;
        transition: background 0.12s ease;
      }
      .select-option:hover, .select-option.is-active { background: var(--accent); }
      .select-option-meta {
        font-size: 0.75rem;
        color: var(--muted-foreground);
        white-space: nowrap;
      }
      .select-option-check { color: var(--primary); display: inline-flex; }
      .select-option-check svg { width: 14px; height: 14px; }
      .select-empty {
        padding: 16px 12px;
        text-align: center;
        font-size: 0.8125rem;
        color: var(--muted-foreground);
      }

      /* Status segmented control */
      .status-segmented {
        display: flex;
        overflow: hidden;
        border-radius: 6px;
        border: 1px solid var(--input);
        background: white;
      }
      .status-segmented button {
        flex: 1;
        border-right: 1px solid var(--input);
        padding: 6px 4px;
        font-size: 0.75rem;
        font-weight: 500;
        font-family: inherit;
        color: var(--muted-foreground);
        background: transparent;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .status-segmented button:last-child { border-right: 0; }
      .status-segmented button.is-active {
        background: var(--primary);
        color: var(--primary-foreground);
      }
      .status-segmented button:not(.is-active):hover {
        background: var(--secondary);
        color: var(--foreground);
      }
      @media (min-width: 1536px) {
        .status-segmented button { font-size: 0.8125rem; }
      }

      /* Checkbox */
      .checkbox-row { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
      .checkbox-input {
        appearance: none;
        width: 16px; height: 16px;
        border-radius: 4px;
        border: 1px solid var(--input);
        background: white;
        position: relative;
        cursor: pointer;

      /* Rich text editor */

      .rte-toolbar {

      /* Skeleton */
      .skeleton-block {

      /* Empty / not found state */

      /* shadcn-style select */
      .select { position: relative; display: inline-block; width: 100%; }
      .select .select-trigger {

      function initSelects(root) {
        (root || document).querySelectorAll('.select:not([data-initialized])').forEach((el) => {
          el.setAttribute('data-initialized', '');
          const trigger = el.querySelector('.select-trigger');
          const popover = el.querySelector('.select-popover');
          const hidden  = el.querySelector('input[type="hidden"]');
          const labelEl = el.querySelector('.select-trigger-label');
          if (!trigger || !popover) return;

          function close() {
            trigger.setAttribute('aria-expanded', 'false');
            popover.style.display = 'none';
          }
          function open() {
            trigger.setAttribute('aria-expanded', 'true');
            popover.style.display = 'block';
            const sel = popover.querySelector('.select-item.is-selected') || popover.querySelector('.select-item');
            if (sel) sel.scrollIntoView({ block: 'nearest' });
          }
          function syncLabel() {
            const sel = popover.querySelector('.select-item.is-selected');
            if (sel) {
              labelEl.textContent = sel.textContent.trim();
              trigger.removeAttribute('data-placeholder');
            } else {
              labelEl.textContent = el.dataset.placeholder || 'Choose...';
              trigger.setAttribute('data-placeholder', 'true');
            }
          }
          function selectValue(value, silent) {
            const v = String(value == null ? '' : value);
            popover.querySelectorAll('.select-item').forEach((it) => {
              it.classList.toggle('is-selected', it.dataset.value === v);
            });
            if (hidden) hidden.value = v;
            syncLabel();
            if (!silent) {
              el.dispatchEvent(new Event('change', { bubbles: true }));
            }
          }
          el._selectSet = (v) => selectValue(v, true);
          if (!Object.getOwnPropertyDescriptor(el, 'value')) {
            Object.defineProperty(el, 'value', {
              get() { return hidden ? hidden.value : ''; },
              set(v) { selectValue(v, true); },
              configurable: true,
            });
          }

          trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = trigger.getAttribute('aria-expanded') === 'true';
            document.querySelectorAll('.select .select-trigger[aria-expanded="true"]').forEach((t) => {
              t.setAttribute('aria-expanded', 'false');
              const pop = t.parentElement.querySelector('.select-popover');
              if (pop) pop.style.display = 'none';
            });
            if (!isOpen) open();
          });
          trigger.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
              e.preventDefault();
              if (trigger.getAttribute('aria-expanded') !== 'true') open();
              const items = Array.from(popover.querySelectorAll('.select-item'));
              const cur = popover.querySelector('.select-item.is-highlighted') || popover.querySelector('.select-item.is-selected') || items[0];
              if (cur) {
                items.forEach((i) => i.classList.remove('is-highlighted'));
                cur.classList.add('is-highlighted');
              }
            } else if (e.key === 'Escape') {
              close();
            }
          });
          popover.addEventListener('click', (e) => {
            const item = e.target.closest('.select-item');
            if (!item) return;
            selectValue(item.dataset.value);
            close();
            trigger.focus();
          });
          popover.addEventListener('keydown', (e) => {
            const items = Array.from(popover.querySelectorAll('.select-item'));
            const curIdx = items.findIndex((i) => i.classList.contains('is-highlighted'));
            if (e.key === 'ArrowDown') {
              e.preventDefault();
              const next = items[(curIdx + 1 + items.length) % items.length];
              items.forEach((i) => i.classList.remove('is-highlighted'));
              if (next) { next.classList.add('is-highlighted'); next.scrollIntoView({ block: 'nearest' }); }
            } else if (e.key === 'ArrowUp') {
              e.preventDefault();
              const prev = items[(curIdx - 1 + items.length) % items.length];
              items.forEach((i) => i.classList.remove('is-highlighted'));
              if (prev) { prev.classList.add('is-highlighted'); prev.scrollIntoView({ block: 'nearest' }); }
            } else if (e.key === 'Enter') {
              e.preventDefault();
              const cur = items[curIdx];
              if (cur) { selectValue(cur.dataset.value); close(); trigger.focus(); }
            } else if (e.key === 'Escape') {
              close();
              trigger.focus();
            }
          });

          // Initial sync from hidden input (if any) or first option marked is-selected
          if (hidden && hidden.value) {
            selectValue(hidden.value, true);
          } else {
            syncLabel();
          }
        });
      }

      // ───── Sidebar renderers ─────
      function renderSidebarNav() {
        const s = store.get();
        const nav = document.getElementById("sidebar-nav");
        const sections = NAV_BY_ROLE[s.user.role] || [];
        nav.innerHTML = sections.map((section, sectionIdx) => `
          <div class="sidebar-section" data-comment="site-checks-edit-sidebar-section-${sectionIdx}">
            ${section.items.map((item) => {
              const isActive = item.path === s.currentPath;
              const slug = item.label.toLowerCase().replace(/\s+/g, "-");
              const badges = item.badge && !s.collapsed
                ? `<span class="sidebar-nav-link-badge" data-comment="site-checks-edit-sidebar-nav-link-${slug}-badges">
                    ${s.reviewBadges.not_pricing_reviewed > 0
                      ? `<span class="sidebar-badge amber" data-comment="site-checks-edit-sidebar-nav-link-${slug}-badge-pricing">${s.reviewBadges.not_pricing_reviewed}</span>` : ""}
                    ${s.reviewBadges.not_shop_reviewed > 0
                      ? `<span class="sidebar-badge blue" data-comment="site-checks-edit-sidebar-nav-link-${slug}-badge-shop">${s.reviewBadges.not_shop_reviewed}</span>` : ""}
                  </span>` : "";
              return `
                <a class="sidebar-nav-link ${isActive ? "active" : ""}" data-comment="site-checks-edit-sidebar-nav-link-${slug}" href="${item.path}" title="${item.label}">
                  <span class="sidebar-nav-link-icon" data-comment="site-checks-edit-sidebar-nav-link-${slug}-icon">${ICONS[item.icon] || ""}</span>
                  <span class="sidebar-nav-link-label" data-comment="site-checks-edit-sidebar-nav-link-${slug}-label">${item.label}</span>
                  ${badges}
                </a>
              `;
            }).join("")}
          </div>
        `).join("");
      }
      function renderUser() {
        const { user } = store.get();
        document.getElementById("sidebar-user-name").textContent = user.name;
        document.getElementById("sidebar-user-email").textContent = user.email;
        document.getElementById("sidebar-user-avatar").textContent = user.name
          .split(" ").slice(0, 2).map((w) => (w[0] || "").toUpperCase()).join("");
      }
      function renderCollapse() {
        const s = store.get();
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("collapsed", s.collapsed);
        document.getElementById("icon-collapse").style.display = s.collapsed ? "none" : "block";
        document.getElementById("icon-expand").style.display = s.collapsed ? "block" : "none";
        document.getElementById("sidebar-search-wrap").style.display = s.collapsed ? "none" : "block";
        document.getElementById("sidebar-search-collapsed").style.display = s.collapsed ? "flex" : "none";
      }
      function renderSidebarSearch() {
        const s = store.get();
        const wrap = document.getElementById("sidebar-search-input-wrap");
        wrap.classList.toggle("is-open", s.searchOpen);
        const showDropdown = s.searchOpen && s.searchTerm.trim().length > 0;
        const dropdown = document.getElementById("sidebar-search-dropdown");
        dropdown.style.display = showDropdown ? "block" : "none";
        if (!showDropdown) return;
        const term = s.searchTerm.trim().toLowerCase();
        const filtered = s.customers.filter((c) => {
          const fullName = `${c.first_name} ${c.last_name}`.toLowerCase();
          return fullName.includes(term) || (c.email && c.email.toLowerCase().includes(term));
        });
        const empty = document.getElementById("sidebar-search-empty");
        const list = document.getElementById("sidebar-search-list");
        if (filtered.length === 0) {
          empty.style.display = "block"; list.style.display = "none";
        } else {
          empty.style.display = "none"; list.style.display = "block";
          list.innerHTML = filtered.slice(0, 8).map((c) => `
            <li data-comment="site-checks-edit-sidebar-search-item-${c.id}">
              <button type="button" class="sidebar-search-dropdown-item" data-comment="site-checks-edit-sidebar-search-item-${c.id}-button" data-customer-id="${c.id}">
                <div class="sidebar-search-dropdown-item-name" data-comment="site-checks-edit-sidebar-search-item-${c.id}-name">${c.first_name} ${c.last_name}</div>
                ${c.email ? `<div class="sidebar-search-dropdown-item-email" data-comment="site-checks-edit-sidebar-search-item-${c.id}-email">${c.email}</div>` : ""}
              </button>
            </li>
          `).join("");
        }
      }

      // ───── Header ─────
      function renderHeader() {
        const s = store.get();
        const titleEl = document.getElementById("edit-page-title");
        const badgeEl = document.getElementById("header-status-badge");
        if (s.record) {
          titleEl.textContent = `Edit Site Check SC-${s.record.id}`;
          const status = s.record.status || "pending";
          const label = SC_LABELS[status] || status;
          const isCompleted = status === "completed";
          badgeEl.innerHTML = `
            <span class="sc-badge ${status}" data-comment="site-checks-edit-header-status-badge" data-component="badge">
              ${isCompleted ? `<span data-comment="site-checks-edit-header-status-icon">${ICONS.check}</span>` : `<span class="dot" data-comment="site-checks-edit-header-status-dot"></span>`}
              ${escapeHtml(label)}
            </span>`;
        } else {
          titleEl.textContent = "Edit Site Check";
          badgeEl.innerHTML = "";
        }
      }

      // ───── Form triggers ─────
      function renderTriggerValues() {
        const s = store.get();
        if (s.isLoading || s.notFound) return;
        const contact = findCustomer(s.form.contact_id);
        const assigned = findUser(s.form.assigned_to_id);
        const estimate = findEstimate(s.form.estimate_id);

        const ct = document.getElementById("contact-trigger-value");
        const at = document.getElementById("assigned-trigger-value");
        const et = document.getElementById("estimate-trigger-value");
        if (!ct || !at || !et) return;

        if (contact) { ct.textContent = customerLabel(contact); ct.classList.remove("placeholder"); }
        else { ct.textContent = "Select customer…"; ct.classList.add("placeholder"); }

        if (assigned) { at.textContent = userLabel(assigned); at.classList.remove("placeholder"); }
        else { at.textContent = "Select user…"; at.classList.add("placeholder"); }

        if (estimate) { et.textContent = estimateLabel(estimate); et.classList.remove("placeholder"); }
        else { et.textContent = "Select estimate…"; et.classList.add("placeholder"); }

        document.getElementById("contact-trigger").classList.toggle("is-open", s.openPopover === "contact");
        document.getElementById("assigned-trigger").classList.toggle("is-open", s.openPopover === "assigned");
        document.getElementById("estimate-trigger").classList.toggle("is-open", s.openPopover === "estimate");

        document.getElementById("contact-popover").classList.toggle("is-open", s.openPopover === "contact");
        document.getElementById("assigned-popover").classList.toggle("is-open", s.openPopover === "assigned");
        document.getElementById("estimate-popover").classList.toggle("is-open", s.openPopover === "estimate");
      }

      function renderContactOptions() {
        const s = store.get();
        if (s.isLoading || s.notFound) return;
        const list = document.getElementById("contact-list");
        if (!list) return;
        const term = s.contactSearch.trim().toLowerCase();
        const items = s.customers.filter((c) =>
          !term ||
          `${c.first_name} ${c.last_name}`.toLowerCase().includes(term) ||
          (c.email && c.email.toLowerCase().includes(term)),
        );
        if (items.length === 0) {
          list.innerHTML = `<li class="select-empty" data-comment="site-checks-edit-field-contact-empty">No customers found.</li>`;
          return;

        list.innerHTML = items.map((c) => `
          <li class="select-option ${s.form.contact_id === c.id ? "is-active" : ""}"
              data-comment="site-checks-edit-field-contact-option-${c.id}"
              data-id="${c.id}">
            <span data-comment="site-checks-edit-field-contact-option-${c.id}-label">${escapeHtml(c.first_name + " " + c.last_name)}</span>
            <span class="select-option-meta" data-comment="site-checks-edit-field-contact-option-${c.id}-meta">

                ? `<span class="select-option-check" data-comment="site-checks-edit-field-contact-option-${c.id}-check">${ICONS.check}</span>`
                : escapeHtml(c.location || "")}
            </span>
          </li>

      function renderEstimateOptions() {
        const s = store.get();
        if (s.isLoading || s.notFound) return;
        const list = document.getElementById("estimate-list");
        if (!list) return;
        const term = s.estimateSearch.trim().toLowerCase();
        const customerId = s.form.contact_id;
        let items = s.estimates;
        if (customerId) items = items.filter((e) => e.customer_id === customerId);
        items = items.filter((e) =>
          !term ||
          e.name.toLowerCase().includes(term) ||
          String(e.id).includes(term),
        );
        if (items.length === 0) {
          list.innerHTML = `<li class="select-empty" data-comment="site-checks-edit-field-estimate-empty">No estimates found.</li>`;
          return;

        list.innerHTML = items.map((e) => `

              data-comment="site-checks-edit-field-estimate-option-${e.id}"
              data-id="${e.id}">
            <span data-comment="site-checks-edit-field-estimate-option-${e.id}-label">${escapeHtml(e.name)}</span>
            <span class="select-option-meta" data-comment="site-checks-edit-field-estimate-option-${e.id}-meta">
              ${s.form.estimate_id === e.id
                ? `<span class="select-option-check" data-comment="site-checks-edit-field-estimate-option-${e.id}-check">${ICONS.check}</span>`
                : escapeHtml(customerLabel(e.customer))}
            </span>

      function renderErrors() {
        const s = store.get();
        if (s.isLoading || s.notFound) return;
        const fields = [
          { key: "contact_id",     triggerId: "contact-trigger",  errorId: "contact-error" },
          { key: "assigned_to_id", triggerId: "assigned-trigger", errorId: "assigned-error" },
          { key: "estimate_id",    triggerId: "estimate-trigger", errorId: "estimate-error" },
        ];
        fields.forEach((f) => {
          const trigger = document.getElementById(f.triggerId);
          const errEl = document.getElementById(f.errorId);
          if (!trigger || !errEl) return;
          const hasError = !!s.errors[f.key];
          trigger.classList.toggle("is-error", hasError);
          errEl.style.display = hasError ? "block" : "none";
          if (hasError) errEl.textContent = s.errors[f.key];
        });
      }

      function renderAttachments() {
        const s = store.get();
        if (s.isLoading || s.notFound) return;
        const list = document.getElementById("upload-list");
        if (!list) return;
        const existing = s.existingFiles.map((f) => `
          <div class="upload-item is-existing" data-comment="site-checks-edit-existing-${f.id}">
            <div class="upload-thumb" data-comment="site-checks-edit-existing-${f.id}-thumb">${ICONS.image}</div>
            <div class="upload-name" data-comment="site-checks-edit-existing-${f.id}-name">${escapeHtml(f.name)}</div>
            <button type="button" class="upload-remove" data-comment="site-checks-edit-existing-${f.id}-remove" data-remove-existing-id="${f.id}" aria-label="Remove existing attachment">${ICONS.x}</button>
          </div>
        `).join("");
        const fresh = s.attachments.map((f) => `
          <div class="upload-item" data-comment="site-checks-edit-attachment-${f.id}">
            <div class="upload-thumb" data-comment="site-checks-edit-attachment-${f.id}-thumb">${ICONS.image}</div>
            <div class="upload-name" data-comment="site-checks-edit-attachment-${f.id}-name">${escapeHtml(f.name)}</div>
            <button type="button" class="upload-remove" data-comment="site-checks-edit-attachment-${f.id}-remove" data-remove-id="${f.id}" aria-label="Remove attachment">${ICONS.x}</button>
          </div>
        `).join("");
        list.innerHTML = existing + fresh;
      }

      function renderSaveBtn() {
        const s = store.get();
        if (s.isLoading || s.notFound) return;
        const btn = document.getElementById("save-btn");
        if (!btn) return;
        btn.disabled = s.isSaving;
        btn.textContent = s.isSaving ? "Saving…" : "Update";
      }

      function renderDialog() {
        const s = store.get();
        const overlay = document.getElementById("delete-overlay");
        overlay.classList.toggle("is-open", s.deleteDialogOpen);
        const discardOverlay = document.getElementById("discard-overlay");
        if (discardOverlay) discardOverlay.classList.toggle("is-open", s.discardDialogOpen);
      }

      function renderToasts() {
        const s = store.get();
        const stack = document.getElementById("toast-stack");
        stack.innerHTML = s.toasts.map((t) => `
          <div class="toast ${t.type}" data-comment="site-checks-edit-toast-${t.id}">${escapeHtml(t.message)}</div>
        `).join("");
      }

      // ───── Show toast ─────
      function showToast(type, message) {
        const id = Date.now() + Math.random();
        store.set((s) => ({ toasts: [...s.toasts, { id, type, message }] }));
        setTimeout(() => {
          store.set((s) => ({ toasts: s.toasts.filter((t) => t.id !== id) }));
        }, 2200);
      }

      // ───── Validation ─────
      function validate(form) {
        const errors = {};
        if (!form.contact_id) errors.contact_id = "Contact is required.";
        if (!form.assigned_to_id) errors.assigned_to_id = "Assigned To is required.";
        if (!form.estimate_id) errors.estimate_id = "Related Estimate is required.";
        return errors;
      }
      function revalidateIfSubmitted() {
        const s = store.get();
        if (!s.submitAttempted) return;
        store.set({ errors: validate(s.form) });
      }
      function setContact(id) {
        store.set((s) => {
          const next = { ...s.form, contact_id: id };
          if (next.estimate_id) {
            const est = findEstimate(next.estimate_id);
            if (est && id != null && est.customer_id !== id) next.estimate_id = null;
          }
          return { form: next, dirty: true };
        });
        revalidateIfSubmitted();
      }
      function setAssigned(id) {
        store.set((s) => ({ form: { ...s.form, assigned_to_id: id }, dirty: true }));
        revalidateIfSubmitted();
      }
      function setEstimate(id) {
        store.set((s) => {
          const next = { ...s.form, estimate_id: id };
          if (id != null) {
            const est = findEstimate(id);
            if (est && !next.contact_id) next.contact_id = est.customer_id;
          }
          return { form: next, dirty: true };
        });
        revalidateIfSubmitted();
      }
      function setOpenPopover(name) { store.set({ openPopover: name }); }
      function addAttachments(files) {
        const list = Array.from(files).map((f) => ({
          id: Date.now() + Math.random(),
          name: f.name,
          size: f.size,
        }));
        store.set((s) => ({ attachments: [...s.attachments, ...list], dirty: true }));
      }
      function removeAttachment(id) {
        store.set((s) => ({ attachments: s.attachments.filter((f) => f.id !== id), dirty: true }));
      }
      function removeExistingFile(id) {
        store.set((s) => ({ existingFiles: s.existingFiles.filter((f) => f.id !== id), dirty: true }));
        showToast("success", "File removed.");
      }

      // ───── Submit ─────
      function handleSubmit(e) {
        e.preventDefault();
        const s = store.get();
        const errors = validate(s.form);
        store.set({ submitAttempted: true, errors });
        if (Object.keys(errors).length > 0) {
          return;
        }
        store.set({ isSaving: true });
        // Mutate seed (simulate update)
        const idx = SEED_SITE_CHECKS.findIndex((sc) => sc.id === recordId);
        if (idx !== -1) {
          const prev = SEED_SITE_CHECKS[idx];
          const startISO = s.form.start_date
            ? new Date(s.form.start_date + "T00:00:00").toISOString()
            : prev.start_date_time;
          SEED_SITE_CHECKS[idx] = {
            ...prev,
            contact_id: s.form.contact_id,
            contact: findCustomer(s.form.contact_id) || prev.contact,
            assigned_to_id: s.form.assigned_to_id,
            assigned_to: findUser(s.form.assigned_to_id) || prev.assigned_to,
            estimate_id: s.form.estimate_id,
            start_date_time: startISO,
            comments: s.form.comments,
            notify_assigned_to: s.form.notify_assigned_to,
            files: s.existingFiles,
          };
        }
        showToast("success", "Site check updated.");
        setTimeout(() => {
          window.location.href = "site-checks.html";
        }, 500);
      }

      // ───── Discard dialog ─────
      function openDiscardDialog() { store.set({ discardDialogOpen: true }); }
      function closeDiscardDialog() { store.set({ discardDialogOpen: false }); }

      // ───── Delete ─────
      function openDeleteDialog() { store.set({ deleteDialogOpen: true }); }
      function closeDeleteDialog() { store.set({ deleteDialogOpen: false }); }
      function confirmDelete() {
        const idx = SEED_SITE_CHECKS.findIndex((sc) => sc.id === recordId);
        if (idx !== -1) SEED_SITE_CHECKS.splice(idx, 1);
        showToast("success", "Site check deleted.");
        setTimeout(() => {
          window.location.href = "site-checks.html";
        }, 400);
      }

      // ───── Mount form ─────
      function mountForm() {
        const root = document.getElementById("edit-root");
        const s = store.get();
        if (s.notFound) {
          root.innerHTML = notFoundHtml();
          return;
        }
        if (s.isLoading) {
          root.innerHTML = skeletonHtml();
          return;
        }
        root.innerHTML = formBodyHtml();

        // Initialize custom date pickers in the freshly rendered form
        if (window.initDatePickers) window.initDatePickers();
        // Initialize custom selects in the freshly rendered form
        initSelects(root);

        // Hydrate form values
        document.getElementById("start-date").value = s.form.start_date || "";
        document.getElementById("notify-checkbox").checked = !!s.form.notify_assigned_to;
        document.getElementById("comments-rte").innerHTML = s.form.comments || "";

        renderTriggerValues();
        renderContactOptions();
        renderAssignedOptions();
        renderEstimateOptions();
        renderErrors();
        renderAttachments();
        renderSaveBtn();

        attachFormHandlers();
      }

      // ───── Form handlers (attached after mount) ─────
      function attachFormHandlers() {
        function toggleAndFocus(name, inputId) {
          const cur = store.get().openPopover;
          const next = cur === name ? null : name;
          setOpenPopover(next);
          if (next) {
            setTimeout(() => { document.getElementById(inputId)?.focus(); }, 0);
          }
        }
        document.getElementById("contact-trigger").addEventListener("click", () => toggleAndFocus("contact", "contact-search"));
        document.getElementById("assigned-trigger").addEventListener("click", () => toggleAndFocus("assigned", "assigned-search"));
        document.getElementById("estimate-trigger").addEventListener("click", () => toggleAndFocus("estimate", "estimate-search"));

        document.getElementById("contact-search").addEventListener("input", (e) => store.set({ contactSearch: e.target.value }));
        document.getElementById("assigned-search").addEventListener("input", (e) => store.set({ assignedSearch: e.target.value }));
        document.getElementById("estimate-search").addEventListener("input", (e) => store.set({ estimateSearch: e.target.value }));

        document.getElementById("contact-list").addEventListener("click", (e) => {
          const li = e.target.closest("[data-id]");
          if (!li) return;
          setContact(Number(li.dataset.id));
          store.set({ openPopover: null, contactSearch: "" });
        });
        document.getElementById("assigned-list").addEventListener("click", (e) => {
          const li = e.target.closest("[data-id]");
          if (!li) return;
          setAssigned(Number(li.dataset.id));
          store.set({ openPopover: null, assignedSearch: "" });
        });
        document.getElementById("estimate-list").addEventListener("click", (e) => {
          const li = e.target.closest("[data-id]");
          if (!li) return;
          setEstimate(Number(li.dataset.id));
          store.set({ openPopover: null, estimateSearch: "" });
        });

        document.addEventListener("click", (e) => {
          const cur = store.get().openPopover;
          if (!cur) return;
          const target = e.target;
          const triggerIds = ["contact-trigger", "assigned-trigger", "estimate-trigger"];
          const popoverIds = ["contact-popover", "assigned-popover", "estimate-popover"];
          const inside = triggerIds.some((id) => document.getElementById(id)?.contains(target))
            || popoverIds.some((id) => document.getElementById(id)?.contains(target));
          if (!inside) setOpenPopover(null);
        });

        document.getElementById("start-date").addEventListener("input", (e) => {
          store.set((s) => ({ form: { ...s.form, start_date: e.target.value }, dirty: true }));
        });
        document.getElementById("notify-checkbox").addEventListener("change", (e) => {
          store.set((s) => ({ form: { ...s.form, notify_assigned_to: e.target.checked }, dirty: true }));
        });

        const rte = document.getElementById("comments-rte");
        rte.addEventListener("input", () => {
          store.set((s) => ({ form: { ...s.form, comments: rte.innerHTML }, dirty: true }));
        });
        document.querySelectorAll(".rte-toolbar button").forEach((btn) => {
          btn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            const cmd = btn.dataset.cmd;
            document.execCommand(cmd, false, null);
            rte.focus();
          });
        });

        const uploadZone = document.getElementById("upload-zone");
        const uploadInput = document.getElementById("upload-input");
        uploadZone.addEventListener("click", () => uploadInput.click());
        uploadInput.addEventListener("change", (e) => {
          if (e.target.files) addAttachments(e.target.files);
          e.target.value = "";
        });
        uploadZone.addEventListener("dragover", (e) => e.preventDefault());
        uploadZone.addEventListener("drop", (e) => {
          e.preventDefault();
          if (e.dataTransfer?.files) addAttachments(e.dataTransfer.files);
        });
        document.getElementById("upload-list").addEventListener("click", (e) => {
          const removeBtn = e.target.closest("[data-remove-id]");
          if (removeBtn) { removeAttachment(Number(removeBtn.dataset.removeId)); return; }
          const removeExistingBtn = e.target.closest("[data-remove-existing-id]");
          if (removeExistingBtn) { removeExistingFile(Number(removeExistingBtn.dataset.removeExistingId)); return; }
        });

        document.getElementById("delete-btn").addEventListener("click", openDeleteDialog);
        document.getElementById("site-check-form").addEventListener("submit", handleSubmit);
        document.getElementById("cancel-btn").addEventListener("click", () => {
          if (store.get().dirty) openDiscardDialog();
          else window.location.href = "site-checks.html";
        });
      }

      // ───── Subscriptions ─────
      store.subscribe(renderSidebarNav);
      store.subscribe(renderUser);
      store.subscribe(renderCollapse);
      store.subscribe(renderSidebarSearch);
      store.subscribe(renderHeader);
      store.subscribe(renderTriggerValues);
      store.subscribe(renderContactOptions);
      store.subscribe(renderAssignedOptions);
      store.subscribe(renderEstimateOptions);
      store.subscribe(renderErrors);
      store.subscribe(renderAttachments);
      store.subscribe(renderSaveBtn);
      store.subscribe(renderDialog);
      store.subscribe(renderToasts);

      // ───── Initial render: shows skeleton, then mounts form after a brief simulated load ─────
      renderSidebarNav();
      renderUser();
      renderCollapse();
      renderSidebarSearch();
      renderHeader();
      mountForm();
      renderDialog();
      renderToasts();

      // Simulate brief load, then mount full form
      setTimeout(() => {
        store.set({ isLoading: false });
        mountForm();
      }, 220);

      // ───── Sidebar handlers ─────
      document.getElementById("sidebar-collapse-btn").addEventListener("click", () => {
        store.set((s) => ({ collapsed: !s.collapsed }));
      });
      const sidebarSearchInput = document.getElementById("sidebar-search-input");
      sidebarSearchInput.addEventListener("focus", () => store.set({ searchOpen: true }));
      sidebarSearchInput.addEventListener("blur", () => setTimeout(() => store.set({ searchOpen: false }), 150));
      sidebarSearchInput.addEventListener("input", (e) => store.set({ searchTerm: e.target.value }));
      document.getElementById("sidebar-search-list").addEventListener("mousedown", (e) => {
        const btn = e.target.closest("[data-customer-id]");
        if (!btn) return;
        const id = btn.dataset.customerId;
        sidebarSearchInput.value = "";
        store.set({ searchOpen: false, searchTerm: "" });
        window.location.href = `customer-detail.html?id=${id}`;
      });
      document.getElementById("sidebar-user-logout").addEventListener("click", () => {
        window.location.href = "login.html";
      });

      // Delete dialog handlers
      document.getElementById("delete-cancel").addEventListener("click", closeDeleteDialog);
      document.getElementById("delete-confirm").addEventListener("click", confirmDelete);
      document.getElementById("discard-keep").addEventListener("click", closeDiscardDialog);
      document.getElementById("discard-confirm").addEventListener("click", () => {
        store.set({ dirty: false, discardDialogOpen: false });
        window.location.href = "site-checks.html";
      });

      /* ───── Date picker (shadcn-style) ───── */
      (function () {
        const NATIVE_VALUE_DESC = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
        function parseDate(v) {
          if (!v) return null;
          if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v)) {
            const [y, m, d] = v.split('-').map(Number);
            return new Date(y, m - 1, d);
          }
          const d = new Date(v);
          return isNaN(d) ? null : d;
        }
        function formatLabel(d) { return d ? `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}` : ''; }
        function formatISO(d) { return d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : ''; }
        function sameDay(a, b) { return a && b && a.toDateString() === b.toDateString(); }

        function initDatePicker(root) {
          if (root.hasAttribute('data-initialized')) return;
          root.setAttribute('data-initialized', '');
          const trigger = root.querySelector('.date-picker-trigger');
          const labelEl = root.querySelector('.date-picker-label');
          const popover = root.querySelector('.date-picker-popover');
          const hidden  = root.querySelector('input[type="hidden"]');
          const placeholder = root.dataset.placeholder || 'Pick a date';
          const commentPrefix = root.dataset.comment || 'dp';
          const state = {
            view: 'days',
            cursor: parseDate(hidden.value || root.dataset.value) || new Date(),
            value: parseDate(hidden.value || root.dataset.value),
          };
          function setHiddenSilently(v) { NATIVE_VALUE_DESC.set.call(hidden, v); }
          function syncTrigger() {
            const text = formatLabel(state.value);
            labelEl.textContent = text || placeholder;
            trigger.setAttribute('data-placeholder', state.value ? 'false' : 'true');
          }
          function close() { trigger.setAttribute('aria-expanded', 'false'); popover.style.display = 'none'; }
          function open()  { trigger.setAttribute('aria-expanded', 'true'); popover.style.display = 'block'; render(); }
          function emit() {
            hidden.dispatchEvent(new Event('input', { bubbles: true }));
            hidden.dispatchEvent(new Event('change', { bubbles: true }));
          }
          Object.defineProperty(hidden, 'value', {
            configurable: true,
            get() { return NATIVE_VALUE_DESC.get.call(this); },
            set(v) {
              NATIVE_VALUE_DESC.set.call(this, v || '');
              const d = parseDate(v);
              state.value = d;
              if (d) state.cursor = new Date(d);
              syncTrigger();
            },
          });
          function render() {
            if (state.view === 'years') return renderYearView();
            const y = state.cursor.getFullYear(), m = state.cursor.getMonth();
            const monthName = state.cursor.toLocaleString('en-US', { month: 'long' });
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m+1, 0).getDate();
            const prevDays = new Date(y, m, 0).getDate();
            const today = new Date();
            const cells = [];
            for (let i = firstDay - 1; i >= 0; i--) cells.push({ d: new Date(y, m-1, prevDays-i), outside: true });
            for (let d = 1; d <= daysInMonth; d++) cells.push({ d: new Date(y, m, d), outside: false });
            let nx = 1;
            while (cells.length < 42) { cells.push({ d: new Date(y, m+1, nx++), outside: true }); }
            popover.innerHTML = `
              <div class="dp-head">
                <button type="button" data-act="prev" data-comment="${commentPrefix}-prev" aria-label="Previous month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
                <span class="dp-month-label" data-act="years" data-comment="${commentPrefix}-month-label">${monthName} ${y}</span>
                <button type="button" data-act="next" data-comment="${commentPrefix}-next" aria-label="Next month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
              </div>
              <div class="dp-weekdays" data-comment="${commentPrefix}-weekdays">${['Su','Mo','Tu','We','Th','Fr','Sa'].map((w, i) => `<div class="dp-weekday" data-comment="${commentPrefix}-weekday-${i}">${w}</div>`).join('')}</div>
              <div class="dp-grid" data-comment="${commentPrefix}-grid">
                ${cells.map((c, i) => `<button type="button" class="dp-day ${c.outside?'is-outside':''} ${sameDay(c.d, today)?'is-today':''} ${sameDay(c.d, state.value)?'is-selected':''}" data-act="pick" data-date="${formatISO(c.d)}" data-comment="${commentPrefix}-day-${i}">${c.d.getDate()}</button>`).join('')}
              </div>
              <div class="dp-foot" data-comment="${commentPrefix}-foot">
                <button type="button" data-act="today" data-comment="${commentPrefix}-today-btn">Today</button>
                <button type="button" data-act="clear" data-comment="${commentPrefix}-clear-btn">Clear</button>
              </div>
            `;
          }
          function renderYearView() {
            const baseYear = Math.floor(state.cursor.getFullYear() / 12) * 12;
            const years = Array.from({ length: 12 }, (_, i) => baseYear + i);
            popover.innerHTML = `
              <div class="dp-head">
                <button type="button" data-act="prev-decade" data-comment="${commentPrefix}-prev-decade" aria-label="Previous decade"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
                <span class="dp-month-label" data-act="back-days" data-comment="${commentPrefix}-decade-label">${baseYear} – ${baseYear+11}</span>
                <button type="button" data-act="next-decade" data-comment="${commentPrefix}-next-decade" aria-label="Next decade"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
              </div>
              <div class="dp-year-grid" data-comment="${commentPrefix}-year-grid">
                ${years.map((y, i) => `<button type="button" class="dp-year ${state.cursor.getFullYear()===y?'is-selected':''}" data-act="set-year" data-year="${y}" data-comment="${commentPrefix}-year-${i}">${y}</button>`).join('')}
              </div>
            `;
          }
          popover.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-act]');
            if (!btn) return;
            e.stopPropagation();
            const act = btn.dataset.act;
            if (act === 'prev')      state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() - 1, 1);
            else if (act === 'next') state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() + 1, 1);
            else if (act === 'years')      state.view = 'years';
            else if (act === 'back-days')  state.view = 'days';
            else if (act === 'prev-decade') state.cursor = new Date(state.cursor.getFullYear() - 12, state.cursor.getMonth(), 1);
            else if (act === 'next-decade') state.cursor = new Date(state.cursor.getFullYear() + 12, state.cursor.getMonth(), 1);
            else if (act === 'set-year') { state.cursor = new Date(+btn.dataset.year, state.cursor.getMonth(), 1); state.view = 'days'; }
            else if (act === 'pick') {
              state.value = parseDate(btn.dataset.date);
              setHiddenSilently(formatISO(state.value));
              syncTrigger(); close(); emit(); return;
            } else if (act === 'today') {
              state.value = new Date(); state.cursor = new Date();
              setHiddenSilently(formatISO(state.value));
              syncTrigger(); close(); emit(); return;
            } else if (act === 'clear') {
              state.value = null;
              setHiddenSilently('');
              syncTrigger(); close(); emit(); return;
            }
            render();
          });
          trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = trigger.getAttribute('aria-expanded') === 'true';
            document.querySelectorAll('.date-picker [aria-expanded="true"]').forEach((t) => {
              t.setAttribute('aria-expanded', 'false');
              const p = t.parentElement.querySelector('.date-picker-popover');
              if (p) p.style.display = 'none';
            });
            if (!isOpen) open();
          });
          if (!hidden.value && root.dataset.value) setHiddenSilently(root.dataset.value);
          if (hidden.value && !state.value) {
            state.value = parseDate(hidden.value);
            if (state.value) state.cursor = new Date(state.value);
          }
          syncTrigger();
        }
        function initAll() { document.querySelectorAll('.date-picker:not([data-initialized])').forEach(initDatePicker); }
        window.initDatePickers = initAll;
        document.addEventListener('click', (e) => {
          document.querySelectorAll('.date-picker [aria-expanded="true"]').forEach((trigger) => {
            const root = trigger.closest('.date-picker');
            if (!root.contains(e.target)) {
              trigger.setAttribute('aria-expanded', 'false');
              const p = root.querySelector('.date-picker-popover');
              if (p) p.style.display = 'none';
            }
          });
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            document.querySelectorAll('.date-picker [aria-expanded="true"]').forEach((t) => {
              t.setAttribute('aria-expanded', 'false');
              const p = t.parentElement.querySelector('.date-picker-popover');
              if (p) p.style.display = 'none';
            });
          }
        });
        initAll();
      })();
    </script>
      <script>
      document.getElementById("mobile-menu-btn") && document.getElementById("mobile-menu-btn").addEventListener("click", function(){ document.body.classList.toggle("sidebar-open"); });
      document.getElementById("sidebar-backdrop") && document.getElementById("sidebar-backdrop").addEventListener("click", function(){ document.body.classList.remove("sidebar-open"); });
      document.querySelectorAll(".app-sidebar a, .sidebar a").forEach(function(a){ a.addEventListener("click", function(){ document.body.classList.remove("sidebar-open"); }); });
    </script>
</body>
